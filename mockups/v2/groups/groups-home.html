<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Informal groups — CGA mockups v2</title>
  <link rel="icon" href="../../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main"><div class="stack" id="root"><p class="gloss">Loading groups…</p></div></main>
  <script>
    window.CGA_PAGE = { id: 'groups/groups-home', title: 'Informal groups', module: 'groups', nav: 'groups', citation: 'Voluntary associations · Art. I freedom of assembly &amp; association', register: 'governance' };
  </script>
  <script src="../../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../manifest.js"></script>
  <script src="../../assets/js/icons.js"></script>
  <script src="../../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var S = window.CGA.shellV2, V2 = window.CGA.fixtures.v2, esc = S.esc, G = V2.groups;
    function render() {
      var cards = G.spaces.map(function (g) {
        var live = g.room ? '<span class="pill pill--live"><span class="dotlive" aria-hidden="true"></span> has a live room</span>' : '';
        return '<a class="role-card" href="' + S.hrefV2('groups/group-detail.html?id=' + g.id) + '">' +
          '<div class="cluster" style="justify-content:space-between"><span class="role-name">' + esc(g.name) + '</span>' +
          '<span class="tag-chip">' + esc(g.privacy) + '</span></div>' +
          '<span>' + esc(g.purpose) + '</span>' +
          '<div class="cluster" style="gap:var(--space-2)"><span class="citation">' + g.members + ' members</span>' + live + '</div>' +
          '<span class="enter-as">Open the group ' + S.icon('arrow-right', { size: 'sm' }) + '</span></a>';
      }).join('');
      document.getElementById('root').innerHTML =
        '<header><span class="eyebrow">People, together · informal groups</span><h1>Informal groups</h1>' +
        '<p class="page-intro">The third social layer, member-driven: voluntary affinity groups that form spontaneously, get a discussion room, and can convene meetings of their own choosing — without being a registered organization or a government.</p>' +
        '<p class="citation">' + esc(G.note) + '</p></header>' +
        '<div class="cluster" style="justify-content:space-between">' +
        '<p class="gloss">Browse and join, or start your own in a step or two.</p>' +
        '<a class="btn btn--primary btn--sm" href="' + S.hrefV2('groups/group-create.html') + '">' + S.icon('users', { size: 'sm' }) + ' Create a group</a></div>' +
        '<section aria-labelledby="g-h"><h2 id="g-h" class="visually-hidden">Groups</h2><div class="role-grid">' + cards + '</div></section>' +
        '<div class="lr-note"><div>' + S.icon('shield', { size: 'sm' }) + '</div><div>' +
        '<strong style="color:var(--gov-fg)">No governance power is conferred.</strong> A group is people choosing to associate. Joining changes nothing about your votes or rights, and your membership is private to you — it never federates. <span class="citation">Art. I freedom of association</span></div></div>';
      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }
    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
