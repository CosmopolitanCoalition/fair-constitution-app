<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Found the instance — CGA mockups v2</title>
  <link rel="icon" href="../../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main"><div class="stack" id="root"><p class="gloss">Loading the founding loop…</p></div></main>
  <script>
    window.CGA_PAGE = { id: 'system/setup', title: 'Found the instance', module: 'system', nav: 'founding', citation: 'The founding loop · reference defaults, not locks · Art. VII', register: 'governance' };
  </script>
  <script src="../../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../manifest.js"></script>
  <script src="../../assets/js/icons.js"></script>
  <script src="../../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var S = window.CGA.shellV2, esc = S.esc;
    var STEPS = ['Cosmic address', 'Constitutional defaults', 'Map data', 'Build districts', 'Confirm & seat'];

    var fseq = 0;
    function field(label, value, hint, opts) {
      opts = opts || {}; var id = 'f' + (++fseq);
      var input = opts.select
        ? '<select class="select" id="' + id + '">' + opts.select.map(function (o) { return '<option>' + esc(o) + '</option>'; }).join('') + '</select>'
        : '<input class="field-input" id="' + id + '" type="' + (opts.type || 'text') + '" value="' + esc(value) + '" />';
      return '<div class="field"><label class="field-label" for="' + id + '">' + esc(label) + '</label>' + input +
        (hint ? '<span class="field-hint citation">' + esc(hint) + '</span>' : '') + '</div>';
    }
    function etlBar(label, n, unit, pop) {
      return '<div class="etl-row"><div class="etl-bar"><span class="etl-fill' + (pop ? ' etl-fill--pop' : '') + '" style="inline-size:100%"></span></div>' +
        '<div class="meter-caption"><span>' + esc(label) + '</span><span data-no-i18n>' + esc(n) + ' / ' + esc(n) + ' ' + esc(unit) + ' (100%)</span></div></div>';
    }
    function tile(n, label) { return '<div class="stat-tile"><span class="n" data-no-i18n>' + esc(n) + '</span><span class="citation">' + esc(label) + '</span></div>'; }

    function stepHead(i) {
      return '<div class="cluster" style="gap:var(--space-2)"><span class="setup-n">' + i + '</span>' +
        '<h2 style="margin:0">' + esc(STEPS[i]) + '</h2></div>';
    }

    function step0() {
      return '<section class="card setup-step" aria-labelledby="s0">' + stepHead(0).replace('<h2 ', '<h2 id="s0" ') +
        '<p>This is the Cosmopolitan Governance App — a federated, open-source platform implementing <em>A Fair Constitution</em>. ' +
        'It models every institution the Template defines as automatable software, from neighborhood scale to planetary scale. First, set the cosmic address your instance federates under.</p>' +
        '<div class="card card--inset"><h3>Or restore from a backup</h3>' +
        '<p class="gloss">Have a <code>.tar.gz</code> exported from another instance? Upload it to skip ahead. The backend validates the manifest’s schema version first; after a successful restore you land on whichever step matches the bundle’s saved progress. <span class="citation">restore lives only here, at Step 0</span></p>' +
        '<div class="cluster"><button type="button" class="btn btn--secondary btn--sm" data-sim>Choose file</button>' +
        '<button type="button" class="btn btn--secondary btn--sm" data-sim>Upload &amp; restore</button></div></div>' +
        '<h3 style="margin-block-start:var(--space-4)">Instance</h3>' +
        field('Instance name', 'United Earth', 'A friendly label — shown in nav and federation directories.') +
        '<h3 style="margin-block-start:var(--space-4)">Cosmic address</h3>' +
        '<p class="citation">Multiverse · Observable Universe · Laniakea Supercluster · Local Group · Milky Way · Orion Arm (Orion Spur) · Solar System · Earth (planet)</p>' +
        field('World', '', '', { select: ['Earth (planet)', 'Luna (moon) — future scope', 'New world…'] }) +
        '<h3 style="margin-block-start:var(--space-4)">Time mode</h3><div class="grid-2">' +
        '<div class="card card--inset" style="border-color:var(--gov-primary)"><strong style="color:var(--gov-fg)">Real-time</strong><br /><span class="gloss">Elections on wall-clock — 5-year default cycle.</span><br /><span class="citation">CLK-01 · election_interval_months 60</span></div>' +
        '<div class="card card--inset"><strong style="color:var(--gov-fg)">Accelerated</strong><br /><span class="gloss">Compressed simulation — pick seconds per simulated year.</span></div>' +
        '</div></section>';
    }

    function step1() {
      function grp(title, fields) { return '<div class="card card--inset"><h3>' + esc(title) + '</h3><div class="grid-2">' + fields + '</div></div>'; }
      return '<section class="card setup-step" aria-labelledby="s1">' + stepHead(1).replace('<h2 ', '<h2 id="s1" ') +
        '<p>The constitutional settings for your instance’s root jurisdiction. You are founding the constitution now — the values are the Fair Constitution Template’s suggested defaults (the “defaults of defaults”), shown as <strong>reference</strong>. You can depart from them here; after setup, amendments go through valid legislative acts.</p>' +
        '<p class="citation">Reference, not locks · Art. VII — see the amendable-settings register for life after founding</p>' +
        grp('Legislature',
          field('Minimum seats per legislature', '5', 'Default of defaults: 5 · Art. II §2', { type: 'number' }) +
          field('Maximum seats per legislature', '9', 'Default of defaults: 9 (before mandatory subdivision) · Art. II §2', { type: 'number' }) +
          field('Legislature sizing law', '', 'Total seats = max(min, round(population^(1/3))) · as implemented', { select: ['Cube-Root Law — round(population^(1/3))'] }) +
          field('Max days between meetings', '90', 'Default of defaults: 90 days · Art. II §2', { type: 'number' })) +
        grp('Elections',
          field('Election interval (months)', '60', 'Default of defaults: 60 (5 years) · Art. II §2 · CLK-01', { type: 'number' }) +
          field('Voting method', '', 'Replaceable only by a MORE proportional method · Art. VII', { select: ['STV with Droop Quota'] }) +
          field('Special election — min days after vacancy', '90', 'Default of defaults: 90 · Art. II §5', { type: 'number' }) +
          field('Special election — max days after vacancy', '180', 'Default of defaults: 180 · Art. II §5', { type: 'number' })) +
        grp('Governance thresholds',
          field('Supermajority (numerator / denominator)', '2 / 3', '≈ 66.7% · cannot fall below majority + 1 · Art. VII', {}) +
          field('Emergency powers max duration (days)', '90', 'Default of defaults: 90 · Art. II §7 · CLK-03', { type: 'number' }) +
          field('Citizen initiative petition threshold (% of population)', '5', 'Default of defaults: 5.00 · CLK-17', { type: 'number' })) +
        grp('Appointments &amp; judiciary',
          field('Civil appointment term (years)', '10', 'Default of defaults: 10 · lockstep with judicial · Art. II §9', { type: 'number' }) +
          field('Judicial appointment term (years)', '10', 'Default of defaults: 10 · lockstep with civil · Art. IV §4', { type: 'number' }) +
          field('Minimum judges per race', '5', 'Default of defaults: 5 · Art. IV §4', { type: 'number' }) +
          '<div class="field"><span class="field-label">Judiciary selection method</span>' +
          '<div class="radio-group"><label class="radio"><input type="radio" name="jud" checked /> Appointed</label>' +
          '<label class="radio"><input type="radio" name="jud" /> Elected</label></div>' +
          '<span class="field-hint citation">Default of defaults: appointed · Art. IV §2–3</span></div>') +
        grp('Organizations &amp; workers',
          field('Worker rep — first seat (employees)', '100', 'Default of defaults: 100 · Art. III §6', { type: 'number' }) +
          field('Worker / shareholder parity (employees)', '2000', 'Default of defaults: 2000 · Art. III §6', { type: 'number' })) +
        '<div class="card card--inset"><h3>Residency</h3>' +
        field('Residency confirmation window (days)', '30', 'Default of defaults: 30 days of qualifying GPS pings before residency is confirmed and rights unlock · CLK-05', { type: 'number' }) + '</div>' +
        '</section>';
    }

    function step2() {
      return '<section class="card setup-step" aria-labelledby="s2">' + stepHead(2).replace('<h2 ', '<h2 id="s2" ') +
        '<p>Pick a data source and run the ETL pipeline. Progress streams live from the ETL container; review any flagged discrepancies before continuing to districting.</p>' +
        '<div class="card card--inset"><h3>1 · Data source</h3><div class="radio-group">' +
        '<label class="radio"><input type="radio" name="src" checked /> Local archive (default) — the bind-mounted map-files volume; fastest, no network</label>' +
        '<label class="radio"><input type="radio" name="src" /> Custom folder — an alternate path inside the ETL container</label>' +
        '<label class="radio"><input type="radio" name="src" disabled /> Custom URL <span class="planned-flag">planned</span></label>' +
        '<label class="radio"><input type="radio" name="src" disabled /> Browser upload <span class="planned-flag">planned</span></label></div></div>' +
        '<div class="card card--inset"><h3>3 · Live progress <span class="badge badge--success">' + S.icon('check', { size: 'sm' }) + ' run completed</span></h3>' +
        '<p class="eyebrow">Boundary</p>' +
        etlBar('Countries', '251', 'countries') + etlBar('States / provinces', '3,382', 'states') +
        etlBar('Counties', '49,345', 'counties') + etlBar('Municipalities', '105,772', 'municipalities') +
        etlBar('Townships', '98,757', 'townships') + etlBar('Neighborhoods', '899,786', 'neighborhoods') +
        '<p class="eyebrow" style="margin-block-start:var(--space-3)">Population</p>' + etlBar('Countries (WorldPop)', '232', 'countries', true) +
        '<p class="eyebrow" style="margin-block-start:var(--space-3)">Final counts</p>' +
        '<div class="stat-tiles">' + tile('232', 'countries') + tile('3,339', 'states / provinces') + tile('49,385', 'counties') +
        tile('105,856', 'municipalities') + tile('94,876', 'townships') + tile('699,737', 'neighborhoods') + tile('951,636', 'total rows') + '</div>' +
        '<p class="citation" style="margin-block-start:var(--space-2)">Finished <span data-no-i18n>2026-05-22T17:17:04+00:00</span></p></div>' +
        '<div class="card card--inset"><h3>4 · Review &amp; accept</h3>' +
        '<p>The import finished. Open the jurisdiction viewer to inspect boundaries, populations, raster overlays, and dual-footprint relationships. Accepting here is what <strong>triggers apportionment</strong>.</p>' +
        '<a class="btn btn--secondary" href="' + S.hrefV1('jurisdictions/jurisdiction-browser.html') + '">Open jurisdiction viewer ' + S.icon('arrow-right', { size: 'sm' }) + ' <span class="v1-tag">v1</span></a></div>' +
        '</section>';
    }

    function step3() {
      return '<section class="card setup-step" aria-labelledby="s3">' + stepHead(3).replace('<h2 ', '<h2 id="s3" ') +
        '<p>This is where your instance gets its first shape. Every legislature needs a map — a partition of its jurisdiction into districts sized within the constitutional min/max seat range.</p>' +
        '<div class="card card--inset" style="border-color:color-mix(in oklch, var(--status-success) 40%, transparent)">' +
        '<h3 style="color:var(--status-success-fg)">' + S.icon('check', { size: 'sm' }) + ' Apportionment complete</h3>' +
        '<div class="cluster" style="gap:var(--space-8)">' +
        '<div class="stat"><span class="stat-number">1</span><span class="stat-label">legislatures sized</span></div>' +
        '<div class="stat stat--accent"><span class="stat-number">1,999</span><span class="stat-label">total seats apportioned</span></div>' +
        '<div class="stat"><span class="stat-number">Earth</span><span class="stat-label">largest · 1,999 seats</span></div></div>' +
        '<p class="gloss" style="margin-block-start:var(--space-2)">Cube-root sizing applied per Taagepera’s law — every parent jurisdiction with direct children now has a sized legislature ready for districting.</p>' +
        '<p class="citation">Art. II §2 · as implemented</p></div>' +
        '<p>The <strong>Earth</strong> legislature is ready. You’re handed off to the interactive district mapper — auto-seed districts from the cube-root law, hand-edit any you want, review quality metrics, and activate the map.</p>' +
        '<a class="btn btn--primary" href="' + S.hrefV1('jurisdictions/district-mapper.html') + '">Go to district mapper ' + S.icon('arrow-right', { size: 'sm' }) + ' <span class="v1-tag">v1</span></a>' +
        '</section>';
    }

    function step4() {
      return '<section class="card setup-step" aria-labelledby="s4">' + stepHead(4).replace('<h2 ', '<h2 id="s4" ') +
        '<p>Review the shape of your instance, then seat the executive and judicial institutions for every jurisdiction with a legislature. They start <strong>forming</strong> — members get elected once the elections engine runs.</p>' +
        '<div class="grid-2">' +
        '<div class="card card--inset"><div class="stat"><span class="stat-number">1</span><span class="stat-label">legislatures formed</span></div></div>' +
        '<div class="card card--inset"><div class="stat"><span class="stat-number">393</span><span class="stat-label">districts drawn</span></div></div></div>' +
        '<div class="card card--inset"><h3>What happens when you click Finish</h3><ul>' +
        '<li>For every jurisdiction with a legislature, one <code>executives</code> row (default <em>committee</em>) and one <code>judiciaries</code> row (default <em>appointed</em>, min 5 judges, 10-year terms).</li>' +
        '<li>No members or seats are populated — those land via the elections engine; status stays <em>forming</em>.</li>' +
        '<li>We record <code>setup_completed_at</code>; from here <code>/setup</code> redirects home.</li></ul>' +
        '<p class="citation">Executive default: committee · Art. III §2 — Judiciary default: appointed · Art. IV §2 · 5 judges · 10-year terms</p></div>' +
        '<div class="card card--inset"><h3>Export this instance (the federation seed)</h3>' +
        '<p class="gloss">Build a portable <code>.tar.gz</code> snapshot — every table downstream of jurisdictions, plus settings and rasters. Restoring it on another instance via Step 0 reproduces the full state, including district maps. This bundle is the <strong>federation seed</strong>: a peer instance restores it at Step 0.</p>' +
        '<button type="button" class="btn btn--secondary btn--sm" data-sim>Start full export</button>' +
        '<div class="log-row" style="margin-block-start:var(--space-2)"><span class="log-seq" data-no-i18n>map-data-…57a8208f</span> ' +
        '<span class="badge badge--success">' + S.icon('check', { size: 'sm' }) + ' done</span> ' +
        '<span class="citation" data-no-i18n>finished 10:09:22 AM · 11.30 GB</span></div></div>' +
        '<div class="banner banner--demo"><div><span class="banner-title">The first founder account is created at the very end of founding</span> — there is no login wall before the wizard. On Finish, play begins as populations reach critical mass (CLK-06).</div></div>' +
        '</section>';
    }

    function render() {
      var stepper = '<ol class="stepper" aria-label="Founding steps">' + STEPS.map(function (n, i) {
        return '<li class="stepper-step stepper-step--done"><span>' + S.icon('check', { size: 'sm' }) + ' ' + esc(n) + '</span></li>';
      }).join('') + '</ol>';

      document.getElementById('root').innerHTML =
        '<header><span class="eyebrow">' + S.icon('sliders', { size: 'sm' }) + ' System · the founding loop</span><h1>Found the instance</h1>' +
        '<p class="page-intro">Before anyone plays, someone founds the world. This is the five-step loop that takes a fresh instance from a <strong>cosmic address</strong> to a <strong>seated constitution</strong> — modeled on the shipped setup wizard, shown here as its completed end-state.</p>' +
        '<p class="citation">' + esc(window.CGA_PAGE.citation) + '</p></header>' +

        '<div class="plane-wall"><span>' + S.icon('info', { size: 'sm' }) + '</span><div>' +
        '<strong style="color:var(--gov-fg)">Founding the constitution? This is it.</strong> Running a box on the mesh is a different job — see ' +
        '<a href="' + S.hrefV2('operator/setup.html') + '">Set up your node</a> on the operator plane. The two setups are siblings, never merged.</div></div>' +

        stepper +
        step0() + step1() + step2() + step3() + step4() +

        '<div class="cluster"><span class="btn btn--primary" aria-disabled="true">Finish setup ' + S.icon('check', { size: 'sm' }) + '</span>' +
        '<span class="citation">Static end-state — a mockup of the founding loop, not a live run.</span></div>';

      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }

    document.addEventListener('click', function (ev) {
      if (ev.target.closest && ev.target.closest('[data-sim]')) S.announce('Mockup — in the running wizard this would run for real.');
    });
    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
