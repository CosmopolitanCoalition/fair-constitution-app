<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Versions &amp; upgrades — the operator plane — CGA mockups v2</title>
  <link rel="icon" href="../../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main"><div class="stack" id="root"><p class="gloss">Loading the operator plane…</p></div></main>
  <script>
    window.CGA_PAGE = { id: 'operator/versioning', title: 'Versions & upgrades', module: 'operator', nav: 'operator-versioning', citation: 'The operator plane — capability, not role · off the constitutional plane', register: 'governance' };
  </script>
  <script src="../../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../assets/js/fixtures-operator.js"></script>
  <script src="../manifest.js"></script>
  <script src="../../assets/js/icons.js"></script>
  <script src="../../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var S = window.CGA.shellV2, O = window.CGA.fixtures.v2.op, esc = S.esc;
    var V = O.versioning;

    function render() {
      /* Section 1 — what can change */
      var kindCards = V.kinds.map(function (k) {
        return '<div class="op-role-card"><div class="cluster" style="justify-content:space-between">' +
          '<span class="orc-title" style="font-size:var(--text-base)">' + esc(k) + '</span>' +
          S.icon('refresh-cw', { size: 'sm' }) + '</div></div>';
      }).join('');

      /* Section 2 — the admissibility filter (a small FSM strip + the rule) */
      var admStrip = '<div class="fsm">' +
        '<span class="fsm-node">proposal</span>' +
        '<span class="fsm-arrow">' + S.icon('arrow-right', { size: 'sm' }) + '</span>' +
        '<span class="fsm-node">admissibility filter</span>' +
        '<span class="fsm-arrow">' + S.icon('arrow-right', { size: 'sm' }) + '</span>' +
        '<span class="fsm-node">consent (Meters A · B · C)</span>' +
        '<span class="fsm-arrow">' + S.icon('arrow-right', { size: 'sm' }) + '</span>' +
        '<span class="fsm-node">ratify</span></div>';

      /* Section 3 — the dual-meter consent cards */
      var meterCards = O.meters.map(function (m) {
        return '<div class="meter-card' + (m.id === 'B' ? ' meter-card--super' : '') + '">' +
          '<div class="cluster" style="gap:var(--space-2)"><span class="mc-id">' + esc(m.id) + '</span>' +
          '<strong style="color:var(--gov-fg)">' + esc(m.name) + '</strong></div>' +
          '<p style="font-size:var(--text-sm)"><strong>Who:</strong> ' + esc(m.who) + '</p>' +
          '<p style="font-size:var(--text-sm)"><strong>Threshold:</strong> ' + esc(m.threshold) + '</p>' +
          '<p class="orc-duty">Applies: ' + esc(m.applies) + '</p>' +
          (m.id === 'C' ? '<span class="pill pill--planned">Peer unanimity — future (G-VER 4)</span>' : '') +
          '</div>';
      }).join('');

      /* Section 5 — peer-version table */
      var peerRows = V.peerMatch.map(function (p) {
        var ok = p.match;
        return '<tr><td>' + esc(p.peer) + '</td>' +
          '<td><code class="form-id">' + esc(p.version) + '</code></td>' +
          '<td>' + (ok
            ? S.badge('success', 'Match', 'check')
            : S.badge('danger', 'Behind', 'alert-triangle')) + '</td>' +
          '<td>' + (p.note ? esc(p.note) : 'Versions agree — sync proceeds.') + '</td></tr>';
      }).join('');

      document.getElementById('root').innerHTML =
        '<header><span class="eyebrow op-eyebrow">The operator plane · versions &amp; upgrades</span>' +
        '<h1>Versions &amp; upgrades</h1>' +
        '<p class="page-intro">How a constitutional version changes hands across the mesh — what may change, the hardened filter that screens every proposal first, the consent that follows, and the freeze that protects a game already in play.</p></header>' +

        /* plane wall */
        '<div class="plane-wall"><span>' + S.icon('shield', { size: 'sm' }) + '</span><div>' +
        '<strong style="color:var(--gov-fg)">Off the constitutional plane.</strong> ' +
        'Upgrading the software is an operator-plane capability, not a citizen privilege. The constitutional rules themselves are never edited from here — a version change is proposed, screened, and only then agreed by the people who actually hold the power.<br />' +
        '<span class="citation">Art. VII · Art. II §7</span></div></div>' +

        /* lead — self version */
        '<div class="health-line"><span class="health-dot health-dot--green" aria-hidden="true"></span>' +
        '<strong style="color:var(--gov-fg)">This instance runs</strong>' +
        '<code class="form-id" style="font-size:var(--text-sm)">' + esc(V.selfVersion) + '</code>' +
        '<span class="citation">the constitutional version — a derived hash of the hardened surface</span></div>' +

        /* Section 1 — what can change */
        '<section aria-labelledby="kinds-h"><h2 id="kinds-h">What can change</h2>' +
        '<p class="page-intro">Three kinds of version move independently. Only the first touches the hardened constitutional surface; the filter in section two guards exactly that one.</p>' +
        '<div class="op-role-grid">' + kindCards + '</div></section>' +

        /* Section 2 — admissibility filter */
        '<section aria-labelledby="adm-h"><h2 id="adm-h">The hardened admissibility filter</h2>' +
        '<p class="page-intro">' + esc(V.admissibility) + '</p>' +
        '<div class="card stack">' + admStrip +
        '<div class="banner banner--warning">' + S.icon('alert-triangle', { size: 'sm' }) +
        '<div><strong>It runs first, and it is reach-independent and ungateable.</strong> ' +
        'A proposal that would lower proportionality, or drop the supermajority floor below majority-plus-one, is refused outright — no meter, no operator, and no amount of reach can wave it through. ' +
        '<span class="citation">Art. VII · supermajority = ceil(serving × 2/3)</span></div></div>' +
        '<p class="advanced-note">The filter reuses the same hardened validator the citizen game runs; it has no separate operator-plane copy to drift.</p>' +
        '</div></section>' +

        /* Section 3 — consent */
        '<section aria-labelledby="consent-h"><h2 id="consent-h">The consent</h2>' +
        '<p class="page-intro">' + esc(V.consent) + ' Below a seated government the operator board decides; the moment a legislature seats itself, its supermajority supersedes the board automatically.</p>' +
        '<div class="meter-abc">' + meterCards + '</div>' +
        '<div class="plane-wall" style="margin-block-start:var(--space-4)"><span>' + S.icon('info', { size: 'sm' }) + '</span><div>' +
        '<strong style="color:var(--gov-fg)">Meter B supersedes Meter A.</strong> ' + esc(O.plane.supersession) +
        ' <span class="citation">Art. VII</span></div></div>' +
        '</section>' +

        /* Section 4 — freeze */
        '<section aria-labelledby="freeze-h"><h2 id="freeze-h">The game-in-progress freeze</h2>' +
        '<p class="page-intro">' + esc(V.freeze) + '</p>' +
        '<div class="card stack">' +
        '<div class="cluster" style="gap:var(--space-2)">' + S.icon('lock', { size: 'sm' }) +
        '<strong style="color:var(--gov-fg)">A running election or session pins its version.</strong></div>' +
        '<p style="font-size:var(--text-sm)">When play begins, the contest captures the constitutional version in force at that moment. Any agreed upgrade lands for the next contest — never the one mid-play — so no one can change the rules under the ballots already cast.</p>' +
        '<span class="citation">Art. II §7 — the game-in-progress freeze</span>' +
        '<p class="advanced-note">Pinning is a pure function of the contest record; there is no manual override to thaw a running game.</p>' +
        '</div></section>' +

        /* Section 5 — peer versions */
        '<section aria-labelledby="peers-h"><h2 id="peers-h">Peer versions</h2>' +
        '<p class="page-intro">Every peer advertises its constitutional version. A peer a version behind cannot be synced into — the mesh refuses fail-closed until the two sides have agreed an upgrade.</p>' +
        '<div class="table-wrap"><table class="table"><thead><tr>' +
        '<th>Peer</th><th>Version</th><th>Match</th><th>What happens</th>' +
        '</tr></thead><tbody>' + peerRows + '</tbody></table></div>' +
        '<div class="banner banner--info" style="margin-block-start:var(--space-3)">' + S.icon('info', { size: 'sm' }) +
        '<div><strong>Fail-closed, not best-effort.</strong> ' +
        'A divergent version stops the sync rather than silently merging mismatched rules. The behind peer must agree the upgrade — through the same dual meter — before its tail will flow again. ' +
        '<span class="citation">Art. VII · Art. II §7</span></div></div>' +
        '</section>' +

        /* closing plane note */
        '<div class="plane-wall"><span>' + S.icon('shield', { size: 'sm' }) + '</span><div>' +
        '<strong style="color:var(--gov-fg)">Answerable to the government.</strong> ' +
        'Operators run the upgrade; they never author the rule. The filter is hardened, the freeze is mechanical, and the seated government has the final say.</div></div>';

      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }
    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
