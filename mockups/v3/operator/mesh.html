<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mesh &amp; federation — the operator plane — World of Statecraft mockups · v3</title>
  <link rel="icon" href="../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main"><div class="stack" id="root"><p class="gloss">Loading the operator plane…</p></div></main>
  <script>
    window.CGA_PAGE = { id: 'operator/mesh', title: 'Mesh & federation', module: 'operator', nav: 'operator-mesh', citation: 'The operator plane — capability, not role · off the constitutional plane', register: 'governance' };
  </script>
  <script src="../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../assets/js/fixtures-operator.js"></script>
  <script src="../manifest.js"></script>
  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var S = window.CGA.shellV2, O = window.CGA.fixtures.v2.op, esc = S.esc;

    /* status badge for a peer (ESM-20 lifecycle). */
    function peerStatusBadge(status) {
      var map = {
        trust_established: { tone: 'success', icon: 'check', label: 'Trust established' },
        syncing: { tone: 'info', icon: 'refresh-cw', label: 'Syncing' },
        border_settled: { tone: 'neutral', icon: 'scale', label: 'Border settled' }
      };
      var m = map[status] || { tone: 'neutral', icon: 'info', label: S.plainState(status) };
      return S.badge(m.tone, m.label, m.icon);
    }

    function syncResult(r) {
      if (r.result === 'conflict_authoritative_wins') {
        return S.badge('warning', 'Authority disputed → resolved', 'alert-triangle');
      }
      return S.badge('success', 'Applied', 'check');
    }

    function transportPill(state) {
      var p = O.STATE_PILL[state] || O.STATE_PILL.qualifiable;
      return '<span class="pill pill--' + p.pill + '" title="' + esc(state) + '">' + esc(p.label) + '</span>';
    }

    function render() {
      /* ---- Section 1: Join a cluster (the stepper) ---- */
      var stepPills = O.joinWizard.map(function (s, i) {
        var cls = i === 0 ? ' stepper-step--active' : '';
        return '<li class="stepper-step' + cls + '"><strong>' + s.step + '</strong>&nbsp;' + esc(s.title) + '</li>';
      }).join('');
      var stepDetail = O.joinWizard.map(function (s) {
        return '<div class="card stack"><div class="cluster" style="gap:var(--space-2)">' +
          '<span class="relation-chip">Step ' + s.step + '</span><strong style="color:var(--gov-fg)">' + esc(s.title) + '</strong></div>' +
          '<p style="font-size:var(--text-sm)">' + esc(s.detail) + '</p></div>';
      }).join('');

      var joinSection =
        '<section aria-labelledby="join-h" class="stack"><h2 id="join-h">Join a cluster</h2>' +
        '<p class="page-intro">A new node joins an existing cluster through a four-step wizard. You either hold a one-shot join-key the host operator minted for you, or you join without one and wait for a peer to vouch for you.</p>' +
        '<ol class="stepper">' + stepPills + '</ol>' +
        '<div class="grid-2">' + stepDetail + '</div>' +
        '<div class="cluster" style="gap:var(--space-2)">' +
        '<span class="pill pill--info" title="a single-use key that authorizes the join">One-shot join-key — minted by the host operator</span>' +
        '<span class="pill pill--wait" title="a peer vouches before trust is established">Or join without a key and wait for a vouch</span></div>' +
        '<div class="lr-note">' + S.icon('info', { size: 'sm' }) +
        '<span>A new node downloads the complete public record from scratch — <strong>every node holds the whole record</strong>. Visiting players can act here too: each action is verified and forwarded to the jurisdiction’s home authority. Joining never moves authority — which box’s record is authoritative for a jurisdiction stays with its home box.</span></div>' +
        '<span class="citation">Cluster join is infrastructure, not a constitutional act.</span></section>';

      /* ---- Section 2: Your peers ---- */
      var peerRows = O.peers.map(function (p) {
        return '<tr>' +
          '<td><strong>' + esc(p.name) + '</strong></td>' +
          '<td><code class="advanced-note">' + esc(p.serverId) + '</code></td>' +
          '<td><span class="advanced-note">' + esc(p.url) + '</span></td>' +
          '<td>' + peerStatusBadge(p.status) + '</td>' +
          '<td><span class="relation-chip">' + esc(p.relation) + '</span></td>' +
          '<td><span class="advanced-note">' + esc(p.version) + ' · ' + esc(p.release) + '</span></td>' +
          '<td>' + esc(p.heartbeat) + '</td>' +
          '<td><span class="advanced-note">' + esc(p.syncSeq.toLocaleString('en-US')) + '</span></td>' +
          '</tr>';
      }).join('');

      var peersSection =
        '<section aria-labelledby="peers-h" class="stack"><h2 id="peers-h">Your peers</h2>' +
        '<p class="page-intro">Every box this node has handshaked with, and where each one sits in the trust lifecycle. The relation chip records how you stand to each peer: a <strong>host</strong> you joined under, a <strong>peer</strong> you sync with both ways, or a <strong>sovereign</strong> peer with a settled border.</p>' +
        '<div class="table-wrap"><table class="table"><thead><tr>' +
        '<th scope="col">Peer</th><th scope="col">Server ID</th><th scope="col">URL</th>' +
        '<th scope="col">Status</th><th scope="col">Relation</th><th scope="col">Version</th>' +
        '<th scope="col">Heartbeat</th><th scope="col">Sync seq</th>' +
        '</tr></thead><tbody>' + peerRows + '</tbody></table></div>' +
        '<span class="citation">Trust lifecycle: trust established · syncing · border settled</span></section>';

      /* ---- Section 3: Full Faith & Credit (the sync ledger) ---- */
      var ledgerRows = O.syncLedger.map(function (l) {
        return '<tr>' +
          '<td><span class="advanced-note">#' + l.seq + '</span></td>' +
          '<td>' + (l.dir === 'outbound'
            ? S.badge('info', 'Outbound', 'arrow-right')
            : S.badge('neutral', 'Inbound', 'arrow-right')) + '</td>' +
          '<td>' + syncResult(l) + (l.note ? '<br /><span class="advanced-note">' + esc(l.note) + '</span>' : '') + '</td>' +
          '<td><span class="advanced-note">' + esc(l.range) + '</span></td>' +
          '<td>' + esc(l.at) + '</td>' +
          '</tr>';
      }).join('');

      var ffcSection =
        '<section aria-labelledby="ffc-h" class="stack"><h2 id="ffc-h">Full Faith &amp; Credit</h2>' +
        '<p class="page-intro">When peers carry one another’s records, the sync ledger is the receipt. Each row is one push or pull, with its result and the record range it covered. An "authority disputed → resolved" result means authority was disputed and then resolved in favour of the authoritative instance — the constitutional record never forks.</p>' +
        '<div class="table-wrap"><table class="table"><thead><tr>' +
        '<th scope="col">Entry</th><th scope="col">Direction</th><th scope="col">Result</th>' +
        '<th scope="col">Range</th><th scope="col">At</th>' +
        '</tr></thead><tbody>' + ledgerRows + '</tbody></table></div>' +
        '<div class="lr-note">' + S.icon('lock', { size: 'sm' }) +
        '<span>The sync ledger is <strong>append-only and public</strong> — like every record on the constitutional plane, it can be read by anyone and never rewritten.</span></div></section>';

      /* ---- Section 4: Becoming a full peer ---- */
      var peerageSection =
        '<section aria-labelledby="peerage-h" class="stack"><h2 id="peerage-h">Becoming a full peer</h2>' +
        '<p class="page-intro">There is one path to peerage, and every node walks it: <strong>qualify → request → approve</strong> — the same channel lifecycle described on <a href="' + S.hrefV2('operator/roles.html') + '">Roles &amp; channels</a>. Once you’re in, your box is a full peer: it holds the complete public record and serves players like any other node.</p>' +
        '<div class="grid-2">' +
        '<div class="card stack"><strong style="color:var(--gov-fg)">What makes nodes differ</strong>' +
        '<p style="font-size:var(--text-sm)">Only two things. Services a box’s hardware can’t host — a small box might skip voice or the live rooms. And the two trust-gated naming channels, <code class="advanced-note">broker.dns</code> and <code class="advanced-note">authority.grant</code>, which reach under other peers’ zones and so need those peers’ consent.</p></div>' +
        '<div class="card stack"><strong style="color:var(--gov-fg)">What “authority” means</strong>' +
        '<p style="font-size:var(--text-sm)">For every jurisdiction, one box’s record is the authoritative one — a bookkeeping fact about where the home copy lives, never a rank. A player can act on <strong>any</strong> node: the action is verified — signed by their own device, carrying an attestation from their home server — and forwarded to the jurisdiction’s home authority. <a href="' + S.hrefV2('operator/identity.html') + '">How a verified action travels</a>.</p></div>' +
        '</div>' +
        '<div class="card stack"><strong style="color:var(--gov-fg)">Moving a jurisdiction’s home copy</strong>' +
        '<p style="font-size:var(--text-sm)">When a home box retires (or its government chooses a new host), authority moves in three verified steps: ' +
        '<strong>1 · export</strong> — the departing box seals a signed export of the jurisdiction’s records; ' +
        '<strong>2 · the flip</strong> — the receiving peer verifies it against the audit chain and the mesh records the new home; ' +
        '<strong>3 · re-peer</strong> — every other node re-points at the new authority on its next sync. Nothing is lost and nothing pauses: reads continue everywhere throughout, and forwarded writes queue until the flip lands.</p></div>' +
        '</section>';

      /* ---- Section 5: Transports ---- */
      var transportRows = O.transports.map(function (t) {
        return '<tr>' +
          '<td><code class="advanced-note">' + esc(t.transport) + '</code></td>' +
          '<td><span class="advanced-note">' + esc(t.address) + '</span></td>' +
          '<td>' + t.priority + '</td>' +
          '<td>' + transportPill(t.state) + '</td>' +
          '</tr>';
      }).join('');

      var transportsSection =
        '<section aria-labelledby="trans-h" class="stack"><h2 id="trans-h">Transports</h2>' +
        '<p class="page-intro">The same signed bytes ride any of five channels, tried in priority order — so the mesh survives even when the open internet does not. A node advertises whichever rungs it can reach.</p>' +
        '<div class="table-wrap"><table class="table"><thead><tr>' +
        '<th scope="col">Transport</th><th scope="col">Address</th><th scope="col">Priority</th><th scope="col">State</th>' +
        '</tr></thead><tbody>' + transportRows + '</tbody></table></div>' +
        '<div class="lr-note">' + S.icon('check', { size: 'sm' }) +
        '<span><code class="advanced-note">mesh:doctor</code> probes every rung on the ladder and reports which transports can actually carry a sync right now.</span></div>' +
        '<span class="citation">Transport survival mesh</span></section>';

      document.getElementById('root').innerHTML =
        '<header><span class="eyebrow op-eyebrow">The operator plane · mesh &amp; federation</span>' +
        '<h1>Mesh &amp; federation</h1>' +
        '<p class="page-intro">How your node finds its peers, carries their records, and survives a hostile network — the federation layer the citizen game rides on.</p></header>' +

        '<div class="plane-wall"><span>' + S.icon('shield', { size: 'sm' }) + '</span><div>' +
        '<strong style="color:var(--gov-fg)">Off the constitutional plane.</strong> Joining, syncing and naming peers are capabilities — they buy no vote, no seat, and no say in any constitutional act.</div></div>' +

        '<div class="health-line"><span class="health-dot health-dot--' + O.readiness.rollup + '" aria-hidden="true"></span>' +
        '<strong style="color:var(--gov-fg)">Peers &amp; sync at a glance</strong>' +
        '<span class="citation">' + O.readiness.peerCount + ' trusted peers · last sync ' + esc(O.readiness.lastSync) + '</span></div>' +

        joinSection +
        peersSection +
        ffcSection +
        peerageSection +
        transportsSection;

      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }
    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
