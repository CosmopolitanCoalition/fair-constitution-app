<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home — World of Statecraft mockups</title>
  <link rel="icon" href="../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main">
    <div class="stack" id="root"><p class="gloss">Loading today…</p></div>
  </main>
  <script>
    window.CGA_PAGE = { id: 'civic/today', title: 'Home', module: 'civic', nav: 'today', register: 'governance' };
  </script>
  <script src="../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../manifest.js"></script>
  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var S = window.CGA.shellV2, V2 = window.CGA.fixtures.v2, esc = S.esc;
    var L = V2.live;

    var tick = null; // the single re-diffing interval, cleared before each render

    /* prefers-reduced-motion: render the remaining-time string once, no ticking */
    var reduce = false;
    try { reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}

    /* the demo bar's scenario flags decide which scenario-gated rows appear.
       liveSession→session+committee, ubiRun→stipend, groupForming→group,
       tradeTalk→trade. A row with no scenarioFlag is always present. */
    function scenarioFlags() {
      try { return window.CGA.state.get('scenario') || {}; } catch (e) { return {}; }
    }

    /* status order for the feed: live, then open, then soon, then window, then
       planned/closed last (planned rows sort to the bottom of their bucket). */
    var STATUS_RANK = { live: 0, open: 1, soon: 2, window: 3, planned: 4, closed: 5 };
    function rank(r) {
      var base = STATUS_RANK[r.status];
      if (base == null) base = 5;
      return r.planned ? base + 10 : base;
    }

    /* deadline(iso) — diff Date.now() to an ISO target → a human remaining string.
       'closesAt' reads "closes in 2h 14m"; 'opensAt' reads "opens in 38m"; the
       dayOf shape reads "day 4 of 90" carrying max from the fixture (never hard-coded). */
    function remaining(ms) {
      if (ms <= 0) return null;
      var totalMin = Math.floor(ms / 60000);
      var d = Math.floor(totalMin / 1440);
      var h = Math.floor((totalMin % 1440) / 60);
      var m = totalMin % 60;
      var parts = [];
      if (d) parts.push(d + 'd');
      if (h) parts.push(h + 'h');
      if (m || !parts.length) parts.push(m + 'm');
      return parts.join(' ');
    }
    function countdownText(target) {
      if (!target) return null;
      if (target.kind === 'dayOf') return 'day ' + target.day + ' of ' + target.max;
      var ms = new Date(target.iso).getTime() - Date.now();
      var rem = remaining(ms);
      if (target.kind === 'opensAt') return rem ? 'opens in ' + rem : 'opening now';
      return rem ? 'closes in ' + rem : 'closing now';
    }

    /* one countdown span. dayOf carries no live ISO; clock shapes carry data-countdown
       so the single interval can re-diff every span at once. */
    function countdownHtml(target) {
      if (!target) return '';
      var text = countdownText(target);
      if (target.kind === 'dayOf') {
        return '<span class="countdown">' + esc(text) + '</span>';
      }
      return '<span class="countdown" data-countdown="' + esc(target.iso) +
        '" data-kind="' + esc(target.kind) + '">' + esc(text) + '</span>';
    }

    function updateCountdowns() {
      var nodes = document.querySelectorAll('#root [data-countdown]');
      Array.prototype.forEach.call(nodes, function (n) {
        var text = countdownText({ kind: n.getAttribute('data-kind'), iso: n.getAttribute('data-countdown') });
        if (text != null) n.textContent = text;
      });
    }

    /* visible rows: scenario-gated rows only show when their flag is on. */
    function visibleRows() {
      var flags = scenarioFlags();
      return L.forFootprint().filter(function (r) {
        return !r.scenarioFlag || flags[r.scenarioFlag];
      }).slice().sort(function (a, b) { return rank(a) - rank(b); });
    }

    function rowHref(r) {
      return r.to.v1 ? S.hrefV1(r.to.rel) : S.hrefV2(r.to.rel);
    }

    /* pill labels/tips come from fixture data; humanize the two insider strings
       at render time ("Planned · L/M" roadmap code, "peg quorum" engine-speak). */
    function pillHtml(r) {
      if (!r.pill) return '';
      var label = /planned/i.test(r.pill.label || '') ? 'Coming soon' : r.pill.label;
      var tip = r.pill.tip && /peg quorum/i.test(r.pill.tip)
        ? 'In session — decisions need a majority of all members, present or not.'
        : r.pill.tip;
      return S.pill(r.pill.tone, label, tip);
    }

    function liveRow(r) {
      var cls = 'live-row' + (r.status === 'live' ? ' live-row--live' : '');
      var pill = pillHtml(r);
      var clock = countdownHtml(r.target);

      return '<div class="' + cls + '">' +
        '<span class="live-icon" aria-hidden="true">' + S.icon(r.icon, { size: 'sm' }) + '</span>' +
        '<span class="live-title">' + esc(r.title) + '</span>' +
        '<span class="live-what">' + esc(r.what) + '</span>' +
        '<span class="gloss" style="flex:1 1 12rem;min-inline-size:0">' + esc(r.part) + '</span>' +
        '<span class="cluster" style="gap:var(--space-2);align-items:center">' +
          pill + clock +
        '</span>' +
        '<a class="btn btn--secondary btn--sm" href="' + rowHref(r) + '">' +
          'Open ' + S.icon('arrow-right', { size: 'sm' }) +
        '</a>' +
      '</div>';
    }

    function emptyState() {
      return '<div class="card card--inset stack" style="gap:var(--space-2)">' +
        '<strong style="color:var(--gov-fg)">Nothing is live in your places right now</strong>' +
        '<span class="gloss">The galleries stay open — every chamber, hall, and gallery is here whenever a proceeding begins.</span>' +
        '</div>';
    }

    /* the community calendar — upcoming events grouped by day, with a chip for
       who is hosting: the jurisdiction, an organization, or residents. */
    function calendarSection() {
      var cal = L.calendar || [];
      if (!cal.length) return '';
      var KIND = {
        jurisdiction: ['Jurisdiction', 'landmark'],
        org: ['Organization', 'building'],
        citizen: ['Residents', 'users']
      };
      var days = [];
      cal.forEach(function (e) { if (days.indexOf(e.day) < 0) days.push(e.day); });
      var body = days.map(function (d) {
        var rows = cal.filter(function (e) { return e.day === d; }).map(function (e) {
          var k = KIND[e.kind] || ['Event', 'clock'];
          var inner =
            '<span class="cal-when">' + S.icon('clock', { size: 'sm' }) + '</span>' +
            '<span class="cal-main"><strong>' + esc(e.title) + '</strong>' +
            '<span class="gloss">' + esc(e.where || '') + '</span></span>' +
            S.badge('info', k[0], k[1]) +
            (e.to ? ' <span class="enter-as">Open ' + S.icon('arrow-right', { size: 'sm' }) + '</span>' : '');
          return e.to
            ? '<a class="cal-row" href="' + S.hrefV2(e.to.rel) + '">' + inner + '</a>'
            : '<div class="cal-row">' + inner + '</div>';
        }).join('');
        return '<div class="cal-day"><h3 class="cal-day-head">' + esc(d) + '</h3>' + rows + '</div>';
      }).join('');
      return '<section class="card" aria-labelledby="cal-h">' +
        '<div class="cluster" style="justify-content:space-between;align-items:baseline">' +
        '<h2 id="cal-h">' + S.icon('clock', { size: 'sm' }) + ' Community calendar</h2>' +
        '<span class="gloss">Jurisdiction, organization &amp; resident events</span></div>' +
        '<p class="gloss">What’s coming up in the places you belong to.</p>' +
        body + '</section>';
    }

    /* "Your rights here" — the compact rights-unlocked block (merged in from the
       old civic-home page): the two unlocked rights plus the chain of places. */
    function rightsSection() {
      var F = window.CGA.fixtures, W = F.world, BY = F.byId;
      var chips = W.defaultChain.map(function (slug) {
        var j = BY.jurisdictions[slug];
        return '<span class="adm-chip adm-chip--' + Math.min(j.admLevel, 5) + '">' + esc(j.name) + ' ' +
          S.icon('check', { size: 'sm', label: 'you live here' }) + '</span>';
      }).join('');
      return '<section class="card" aria-labelledby="rights-h">' +
        '<h2 id="rights-h">Your rights here</h2>' +
        '<div class="cluster" style="gap:var(--space-4)">' +
        S.badge('success', 'Voting unlocked', 'check') +
        S.badge('success', 'Candidacy unlocked', 'check') +
        '<span class="hardened">' + S.icon('lock', { size: 'sm' }) +
        ' Protected — built into the rules; no vote or official can take these away</span></div>' +
        '<p class="gloss" style="margin-block-start:var(--space-3)">Living here is the only requirement — ' +
        'these unlocked the moment your residency was confirmed, in every place that contains your home:</p>' +
        '<div class="cluster" style="margin-block-start:var(--space-2)">' + chips + '</div>' +
        '</section>';
    }

    function render() {
      if (tick) { clearInterval(tick); tick = null; }

      var list = visibleRows();
      // "happening" = the rows that need attention now: live + open.
      var happening = list.filter(function (r) {
        return r.status === 'live' || r.status === 'open';
      }).length;

      var header =
        '<header><span class="eyebrow">Home · today in your places</span>' +
        '<h1>Home — ' + happening + ' thing' + (happening === 1 ? ' is' : 's are') + ' happening now</h1>' +
        '<p class="page-intro">Everything live in the places you live, each one a tap away. ' +
        'You can watch every public proceeding; you speak, testify, and vote where you live.</p></header>';

      var rail =
        '<div class="banner banner--info">' + S.icon('info', { size: 'sm' }) +
        '<div>' + esc(L.rail) + '</div></div>';

      var feed =
        '<section aria-labelledby="now-h" class="stack" style="gap:var(--space-2)">' +
        '<h2 id="now-h">Live in your places</h2>' +
        (list.length ? list.map(liveRow).join('') : emptyState()) +
        '</section>';

      var calendar = calendarSection();

      var foot =
        '<p class="gloss">The money items are previews — practice units only, no real payments yet.</p>';

      document.getElementById('root').innerHTML = header + rail + feed + calendar + rightsSection() + foot;

      // start the single re-diffing interval unless reduced motion is requested.
      if (!reduce && document.querySelector('#root [data-countdown]')) {
        tick = setInterval(updateCountdowns, 1000);
      }

      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }
    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
