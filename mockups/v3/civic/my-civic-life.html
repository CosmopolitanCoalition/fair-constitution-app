<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My profile — CGA mockups v3</title>
  <link rel="icon" href="../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main">
    <div class="stack" id="root"><p class="gloss">Loading your profile…</p></div>
  </main>
  <script>
    window.CGA_PAGE = { id: 'civic/my-civic-life', title: 'My profile', module: 'civic', nav: 'my-civic-life', register: 'governance' };
  </script>
  <script src="../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../assets/js/fixtures-econ.js"></script>
  <script src="../manifest.js"></script>
  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script src="../assets/js/profile-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var root = document.getElementById('root');
    function paint() {
      root.innerHTML = CGA.profileV2.render({ self: true });   // your own profile; ?tab= still honoured
      CGA.profileV2.wire(root);
      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }
    paint();
    document.addEventListener('cga:v2:rerender', paint);
  })();
  </script>
</body>
</html>
