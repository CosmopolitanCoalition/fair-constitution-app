<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Journey — World of Statecraft mockups · v3</title>
  <link rel="icon" href="../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main"><div class="stack" id="root"><p class="gloss">Loading the journey…</p></div></main>
  <script>
    window.CGA_PAGE = { id: 'journeys/journey', title: 'Journey', module: 'journeys', nav: 'journeys', citation: 'A guided civic journey · learn it by doing it', register: 'governance' };
  </script>
  <script src="../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../assets/js/fixtures-learn.js"></script>
  <script src="../assets/js/fixtures-translation.js"></script>
  <script src="../assets/js/fixtures-support.js"></script>
  <script src="../manifest.js"></script>
  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script src="../assets/js/components-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var S = window.CGA.shellV2, C = window.CGA.v2c, V2 = window.CGA.fixtures.v2, L = V2.learn, esc = S.esc;

    function jid() { try { return new URLSearchParams(location.search).get('id') || 'election'; } catch (e) { return 'election'; } }
    var J = V2.byJourney[jid()] || V2.byJourney.election;
    var cls = V2.byClass[J.cls];
    /* the world's TRUE current step + a snapshot — the rail marker, the arc
       marker, and the now/next sentence ALL derive from this single currentStep.
       This is the WORLD's live state; your own progress is stored separately. */
    var jl = (V2.journeyLive && V2.journeyLive[J.id]) || { currentStep: 0, snapshot: { statusPill: { tone: 'info', label: 'In progress' } } };
    var cur = jl.currentStep || 0;
    var snap = jl.snapshot || { statusPill: { tone: 'info', label: 'In progress' } };
    var ROOM_LABEL = { committee: 'Committee hearing', legislative: 'Legislative session', exec: 'Executive committee', board: 'Board meeting', court: 'Court hearing', forum: 'Candidate forum', townhall: 'Referendum town hall', group: 'Group meeting' };
    var ROOM_ICON = { committee: 'landmark', legislative: 'landmark', exec: 'briefcase', board: 'building', court: 'scale', forum: 'vote', townhall: 'users', group: 'users' };

    /* human titles for the formal-moment chips — looked up from the tour */
    var TOUR_TITLE = {};
    (S.tour || []).forEach(function (t2) { TOUR_TITLE[t2.rel] = t2.title; });

    /* ---- YOUR progress — durable, per journey, stored in this browser ---- */
    var DONE_KEY = 'cga-journey-done:' + J.id;
    function loadDone() {
      try { var a = JSON.parse(localStorage.getItem(DONE_KEY) || '[]'); return Array.isArray(a) ? a : []; }
      catch (e) { return []; }
    }
    function saveDone(a) { try { localStorage.setItem(DONE_KEY, JSON.stringify(a)); } catch (e) {} }
    var myDone = loadDone();
    function stepDone(i) { return myDone.indexOf(i) >= 0; }
    function toggleStep(i) {
      var at = myDone.indexOf(i);
      if (at >= 0) myDone.splice(at, 1); else myDone.push(i);
      saveDone(myDone);
      S.announce(at >= 0 ? 'Step marked not done.' : 'Step marked done — saved to your progress.');
      render();
    }

    /* reduced-motion-guarded live countdown */
    var reduce = false;
    try { reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
    var ticker = null;
    function deadline(iso) {
      var ms = new Date(iso).getTime() - Date.now(), abs = Math.abs(ms);
      if (abs < 60000) return ms >= 0 ? 'opens in under a minute' : 'just now';
      var h = Math.floor(abs / 3600000), m = Math.floor((abs % 3600000) / 60000);
      var span = h > 0 ? h + 'h ' + m + 'm' : m + 'm';
      return ms >= 0 ? 'opens in ' + span : span + ' ago';
    }
    function countdownEl(iso) {
      var label = deadline(iso);
      return '<span class="countdown" data-countdown="' + esc(iso) + '">' + esc(label) + '</span>';
    }
    function startTicker() {
      if (ticker) { clearInterval(ticker); ticker = null; }
      if (reduce) return;
      ticker = setInterval(function () {
        var els = document.querySelectorAll('[data-countdown]');
        if (!els.length) { clearInterval(ticker); ticker = null; return; }
        for (var i = 0; i < els.length; i++) {
          els[i].textContent = deadline(els[i].getAttribute('data-countdown'));
        }
      }, 1000);
    }

    function render() {
      var built = J.status === 'built-layer';
      var statusPill = built
        ? '<span class="pill pill--live">Live in this world</span>'
        : '<span class="pill pill--planned">Coming soon</span>';

      /* the world's progress rail — current marker = jl.currentStep */
      var rail = '<ol class="journey-rail" aria-label="Where the world is in this journey">' + J.rail.map(function (step, i) {
        var done = i < cur;
        return (i > 0 ? '<li class="rail-arrow" aria-hidden="true">' + S.icon('arrow-right', { size: 'sm' }) + '</li>' : '') +
          '<li' + (i === cur ? ' class="rail--current"' : '') + (i === cur ? ' aria-current="step"' : '') + '>' +
          (done ? S.icon('check', { size: 'sm' }) + ' ' : '') + esc(step) + '</li>';
      }).join('') + '</ol>';

      /* the arc — each step as a card; the world's marker + YOUR done-toggle */
      var arc = '<ol class="flow-steps">' + J.rail.map(function (step, i) {
        var worldDone = i < cur;
        var mine = stepDone(i);
        return '<li class="flow-step' + (i === cur ? ' flow-step--current' : '') + '">' +
          '<div class="flow-step-head"><span class="flow-step-n">' + (i + 1) + '</span>' +
          (worldDone ? '<span class="live-icon">' + S.icon('check', { size: 'sm' }) + '</span>' : '') +
          '<span class="flow-action" style="color:var(--gov-fg)">' + esc(step) + '</span></div>' +
          '<div class="cluster" style="margin-block-start:var(--space-1)">' +
          '<button type="button" class="btn ' + (mine ? 'btn--secondary' : 'btn--ghost') + ' btn--sm" data-step-done="' + i + '" aria-pressed="' + (mine ? 'true' : 'false') + '">' +
          (mine ? S.icon('check', { size: 'sm' }) + ' Done — tap to undo' : 'Mark this step done') + '</button></div></li>';
      }).join('') + '</ol>';

      /* YOUR progress — a durable rail of your own, distinct from the world's */
      var doneCount = 0;
      for (var di = 0; di < J.rail.length; di++) if (stepDone(di)) doneCount++;
      var minePct = Math.round((doneCount / J.rail.length) * 100);
      var complete = doneCount === J.rail.length;
      var mineBlock = '<div class="card card--inset" style="margin-block-start:var(--space-3)">' +
        '<div class="cluster" style="justify-content:space-between;align-items:baseline">' +
        '<span class="eyebrow">' + S.icon('user', { size: 'sm' }) + ' Your progress</span>' +
        (complete ? '<span class="pill pill--pass">' + S.icon('award', { size: 'sm' }) + ' Journey complete</span>'
                  : '<span class="pill pill--info">' + doneCount + ' of ' + J.rail.length + ' steps</span>') + '</div>' +
        '<div class="meter" role="meter" aria-valuemin="0" aria-valuemax="' + J.rail.length + '" aria-valuenow="' + doneCount + '" aria-label="Your progress — ' + doneCount + ' of ' + J.rail.length + ' steps done">' +
        '<span class="meter-fill' + (complete ? ' meter-fill--met' : '') + '" style="inline-size:' + minePct + '%"></span></div>' +
        '<p class="gloss" style="margin-block-start:var(--space-1)">' +
        (complete
          ? 'You’ve walked the whole arc — this journey now belongs on <a href="' + S.hrefV2('civic/my-civic-life.html?tab=achievements') + '">your profile</a>.'
          : 'Mark off each step as you do it. Your progress is yours — it’s saved for you, separate from where the world is.') +
        '</p></div>';

      /* the live rooms this journey passes through */
      var rooms = (J.rooms || []).map(function (rv) {
        return '<a class="role-card" href="' + S.hrefV2('shared/live-room.html?variant=' + rv) + '">' + S.icon(ROOM_ICON[rv] || 'landmark') +
          '<span class="role-name">' + esc(ROOM_LABEL[rv] || rv) + '</span>' +
          '<span>Step into the room where the people actually act.</span>' +
          '<span class="enter-as">Open the room ' + S.icon('arrow-right', { size: 'sm' }) + '</span></a>';
      }).join('');

      /* the formal steps open their own screens — human titles from the tour */
      var v1 = (J.reusesV1 || []).map(function (rel) {
        var label = TOUR_TITLE[rel] || rel.replace(/^.*\//, '').replace(/\.html$/, '').replace(/-/g, ' ');
        return '<a class="form-chip" href="' + S.hrefV1(rel) + '">' + S.icon('arrow-right', { size: 'sm' }) + ' ' + esc(label) + '</a>';
      }).join(' ');

      /* now / your part / next — the world's side, from the same currentStep */
      var curStepName = J.rail[cur] || J.rail[0];
      var nowText = snap.now || curStepName;
      var nextStep = J.rail[cur + 1] || J.rail[J.rail.length - 1];
      var yourPart = J.yourPart ||
        ((J.rooms || []).length
          ? 'follow the arc below — watch from the gallery, or take the floor where you’re a resident'
          : 'follow the arc below');

      /* the live snapshot strip — current step + status pill, an honest countdown
         to the next step (only when a real target exists and it isn't planned),
         and a "step into the room" CTA when a room variant is set */
      var sp = snap.statusPill || { tone: 'info', label: 'In progress' };
      var planned = sp.tone === 'planned';
      var showCountdown = !planned && snap.target && snap.target.iso;
      var liveStrip = '<div class="live-row' + (sp.tone === 'live' ? ' live-row--live' : '') + '" aria-label="Live snapshot of this journey">' +
        '<span class="live-icon">' + S.icon(planned ? 'clock' : 'play', { size: 'sm' }) + '</span>' +
        '<span class="live-title">' + esc(curStepName) + '</span>' +
        S.pill(sp.tone, sp.label) +
        (showCountdown
          ? '<span class="live-what">Next — ' + esc(nextStep) + ' ' + countdownEl(snap.target.iso) + '</span>'
          : '<span class="live-what">Next — ' + esc(nextStep) + '</span>') +
        (snap.roomVariant
          ? '<a class="enter-as" href="' + S.hrefV2('shared/live-room.html?variant=' + snap.roomVariant) + '">Step into the room ' + S.icon('arrow-right', { size: 'sm' }) + '</a>'
          : '') +
        '</div>';

      /* the SOP-in-interface once-over: the video + standard procedure that
         makes this journey understandable before you act in it */
      var sop = (L.sops || []).filter(function (s) { return s.journeyId === J.id; })[0];
      var understand = sop
        ? '<section aria-labelledby="sop-h"><h2 id="sop-h">Understand it first</h2>' +
            '<p class="page-intro">A short guide and the standard procedure — so you know what’s about to happen before you step in.</p>' +
            (sop.videoId ? '<div class="card" style="margin-block-end:var(--space-4)">' + C.videoPlayer(sop.videoId) + '</div>' : '') +
            C.sopPanel(sop.id, { hideVideo: true }) + '</section>'
        : '';

      /* what completing this journey earns — the durable reward footer */
      var roomNames = (J.rooms || []).map(function (rv) { return ROOM_LABEL[rv] || rv; });
      var unlockText = roomNames.length
        ? 'the ' + roomNames.join(' and the ').toLowerCase() + ' will greet you as someone who knows the ropes'
        : 'the places this journey touches will greet you as someone who knows the ropes';
      var earns = '<section class="card" aria-labelledby="earn-h"><h2 id="earn-h">' + S.icon('award', { size: 'sm' }) + ' What completing this earns</h2><ul>' +
        '<li><strong>A medal on your profile</strong> — “' + esc(J.title) + '” joins <a href="' + S.hrefV2('social/achievements.html') + '">your achievements</a>.</li>' +
        '<li><strong>A one-time stipend bonus</strong> — paid into your wallet when the economy goes live.</li>' +
        '<li><strong>A head start</strong> — ' + esc(unlockText) + '. A friendly nudge, never a locked door.</li>' +
        '</ul><p class="citation">A medal never changes a vote, a seat, or what you’re allowed to do.</p></section>';

      document.getElementById('root').innerHTML =
        '<header><div class="cluster" style="justify-content:space-between">' +
        '<div class="cluster">' + (J.flagship ? '<span class="pill pill--vote">Flagship</span>' : '') +
        '<span class="eyebrow">' + esc(cls.title) + '</span></div>' + statusPill + '</div>' +
        '<h1>' + esc(J.title) + '</h1>' +
        '<p class="page-intro">A journey is something you learn by doing it. Follow the real thing as it moves through the world, mark off the steps you take, and finish it to earn a place on your profile.</p></header>' +
        /* now / your part / next */
        '<div class="lr-note"><div>' + S.icon('info', { size: 'sm' }) + '</div><div>' +
        '<strong style="color:var(--gov-fg)">Now:</strong> ' + esc(nowText) + '. ' +
        '<strong style="color:var(--gov-fg)">Your part:</strong> ' + esc(yourPart) + '. ' +
        '<strong style="color:var(--gov-fg)">Next:</strong> ' + esc(nextStep) + '.</div></div>' +
        understand +
        '<section class="card"><span class="eyebrow">The arc</span>' + liveStrip + rail + mineBlock + arc + '</section>' +
        (rooms ? '<section aria-labelledby="rooms-h"><h2 id="rooms-h">Where you act — the Live Civic Room</h2>' +
          '<p class="page-intro">Every journey passes through at least one live room, where the form, the vote, and the social floor are fused.</p>' +
          '<div class="role-grid">' + rooms + '</div></section>' : '') +
        (J.id === 'bill' ? '<section class="card"><span class="eyebrow">Open the bill</span>' +
          '<p>You can open this bill and watch it move — its progress through the stages, the comments, and the redline negotiation over its clauses.</p>' +
          '<a class="btn btn--primary btn--sm" href="' + S.hrefV2('shared/bill.html?id=bill-2031-07') + '">' + S.icon('file-text', { size: 'sm' }) + ' Open the Clean Air Act ' + S.icon('arrow-right', { size: 'sm' }) + '</a></section>' : '') +
        (v1 ? '<section class="card"><span class="eyebrow">The formal moment</span>' +
          '<p>The formal steps happen on their own screens — open one to see the actual paperwork moment.</p>' +
          '<div class="cluster" style="gap:var(--space-1)">' + v1 + '</div></section>' : '') +
        earns +
        '<div class="cluster" style="justify-content:space-between"><a href="' + S.hrefV2('index.html') + '">' + S.icon('arrow-right', { size: 'sm', cls: 'icon--directional' }) + ' All journeys</a>' +
        C.reportLink(J.title) + '</div>';

      C.initVideo(document.getElementById('root'));
      startTicker();
      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }

    /* one delegated listener survives re-renders */
    document.getElementById('root').addEventListener('click', function (ev) {
      var b = ev.target.closest ? ev.target.closest('[data-step-done]') : null;
      if (b) toggleStep(parseInt(b.getAttribute('data-step-done'), 10));
    });

    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
