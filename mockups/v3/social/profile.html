<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile — World of Statecraft mockups · v3</title>
  <link rel="icon" href="../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main">
    <div class="stack" id="root"><p class="gloss">Loading profile…</p></div>
  </main>
  <script>
    window.CGA_PAGE = { id: 'social/profile', title: 'Profile', module: 'social', nav: 'my-civic-life', register: 'governance' };
  </script>
  <script src="../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../assets/js/fixtures-econ.js"></script>
  <script src="../manifest.js"></script>
  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script src="../assets/js/profile-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var root = document.getElementById('root');
    function hasWho() {
      try { return !!new URLSearchParams(location.search).get('who'); } catch (e) { return false; }
    }
    function paint() {
      var S = window.CGA.shellV2;
      /* this page is for LOOKING SOMEONE UP (?who=). Without ?who it shows a
         sample so the layout is browsable — with a signpost to the real thing. */
      var note = hasWho() ? '' :
        '<div class="banner banner--info">' + S.icon('info', { size: 'sm' }) +
        '<div>Showing a sample profile. Your own lives at <a href="' + S.hrefV2('civic/my-civic-life.html') + '">My profile</a> — open any person from the square or the halls to see theirs here.</div></div>';
      root.innerHTML = note + CGA.profileV2.render({});   // who/tab read from the URL; self by default
      CGA.profileV2.wire(root);
      if (S) S.refresh();
    }
    paint();
    document.addEventListener('cga:v2:rerender', paint);
  })();
  </script>
</body>
</html>
