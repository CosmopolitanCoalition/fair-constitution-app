<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Social — CGA mockups v2</title>
  <link rel="icon" href="../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main">
    <div class="stack" id="social-root"><p class="gloss">Loading the square…</p></div>
  </main>
  <script>
    window.CGA_PAGE = { id: 'social/social-home', title: 'Social', module: 'social', nav: 'my-civic-life', citation: 'The public square — open resident discourse', register: 'governance' };
  </script>
  <script src="../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../manifest.js"></script>
  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var S = window.CGA.shellV2, V2 = window.CGA.fixtures.v2, esc = S.esc;

    /* the personal profile lives on fixtures-econ in the full economy site, but
       the social home carries its own light feed + a follows summary drawn from
       the v2 personas. Compose a few pseudonymous square posts in-page. */
    var me = { handle: 'amara', name: 'Amara Okafor', followsCount: 84, followersCount: 212 };

    /* recent square posts — pseudonymous @u-handles; seat badges where the
       author is a seated rep speaking in their own capacity. */
    var feed = [
      { handle: 'amara', seat: null, when: '12m',
        body: 'Filed today’s depot air readings as committee testimony — they exceed the planetary baseline on still days. The Clean Air Act hearing is tonight; anyone in New York County can watch or speak.',
        room: 'committee', tags: ['clean-air-act', 'harbor'] },
      { handle: 'marcus', seat: { role: 'legislature_member', label: 'Committee chair' }, when: '34m',
        body: 'The Environment & Infrastructure committee opens public testimony on the Clean Air Act at 7pm. I chair, but the floor is yours — bring your readings, your block, your bus stop.',
        room: 'committee', tags: ['clean-air-act'] },
      { handle: 'u-pier7', seat: null, when: '1h',
        body: 'Three Saturdays of harbor cleanup and Pier 7 already looks different. Next crew meeting is open — the Harbor Cleanup Crew is a voluntary group, no sign-up gate.',
        room: 'group', tags: ['harbor'] },
      { handle: 'yuki', seat: { role: 'speaker', label: 'Speaker' }, when: '2h',
        body: 'Reminder: a square post is talk, not a vote. If you want the participatory-budget pilot on the agenda, it goes through the petition, then a referendum — not a like count.',
        room: 'townhall', tags: ['participatory-budget'] }
    ];

    function seatBadge(seat) {
      if (!seat) return '';
      return ' ' + S.badge('info', seat.label, 'landmark');
    }

    /* a pseudonymous handle: always @u-<localpart>, never doubled */
    function mxid(h) { return h && h.indexOf('u-') === 0 ? '@' + h : '@u-' + h; }
    function presNameOf(p) { return p.name || p.handleName || mxid(p.handle); }

    /* "who is in the halls right now" — rosters of two open rooms, each linking
       into the live room. Presence is server-local and never federated. */
    function presenceStrip() {
      var rooms = V2.rooms || {};
      var openRooms = [
        { cfg: rooms.committee, variant: 'committee', title: 'Committee hearing', icon: 'landmark' },
        { cfg: rooms.townhall, variant: 'townhall', title: 'Referendum town hall', icon: 'landmark' }
      ].filter(function (r) { return r.cfg && r.cfg.presence; });
      if (!openRooms.length) return '';
      var cols = openRooms.map(function (r) {
        var pres = r.cfg.presence.filter(function (p) { return p.online !== false; });
        var rows = pres.slice(0, 6).map(function (p) {
          return '<div class="presence-row' + (p.speaking ? ' presence-row--speaking' : '') + '">' +
            '<span class="presence-dot" aria-hidden="true"></span>' +
            (p.speaking ? S.icon('vote', { size: 'sm' }) : '') +
            '<span class="presence-name">' + esc(presNameOf(p)) + '</span>' +
            '<span class="handle">' + esc(mxid(p.handle)) + '</span>' +
            (p.speaking ? '<span class="presence-tag">has the floor</span>' : '') + '</div>';
        }).join('');
        return '<div class="card card--inset">' +
          '<div class="cluster" style="justify-content:space-between;align-items:baseline">' +
          '<span class="eyebrow">' + S.icon(r.icon, { size: 'sm' }) + ' ' + esc(r.title) + '</span>' +
          '<span class="pill pill--live"><span class="dotlive" aria-hidden="true"></span>' + pres.length + ' here now</span></div>' +
          '<p class="citation" style="margin-block:var(--space-1)">' + esc(r.cfg.title) + '</p>' +
          '<div class="stack" style="gap:var(--space-1)">' + rows + '</div>' +
          '<div class="cluster" style="margin-block-start:var(--space-2)">' +
          '<a class="btn btn--secondary btn--sm" href="' + S.hrefV2('shared/live-room.html?variant=' + r.variant) + '">' +
          S.icon('users', { size: 'sm' }) + ' Step into the room ' + S.icon('arrow-right', { size: 'sm' }) + '</a></div></div>';
      }).join('');
      return '<section aria-labelledby="halls-now-h"><div class="cluster" style="justify-content:space-between;align-items:baseline">' +
        '<h2 id="halls-now-h">Who is in the halls right now</h2></div>' +
        '<div class="grid-2">' + cols + '</div>' +
        '<p class="never-federated" style="margin-block-start:var(--space-2)">' + S.icon('lock', { size: 'sm' }) +
        ' Presence is server-local — who is in a room is never federated and confers no governance power.</p></section>';
    }
    function tagChips(tags) {
      return (tags || []).map(function (t) {
        return '<span class="tag-chip">#' + esc(t) + '</span>';
      }).join(' ');
    }
    function postRow(p) {
      var roomLink = p.room
        ? '<a href="' + S.hrefV2('shared/live-room.html?variant=' + esc(p.room)) + '">' +
          S.icon('users', { size: 'sm' }) + ' open the room ' + S.icon('arrow-right', { size: 'sm' }) + '</a>'
        : '';
      return '<article class="lr-note" style="flex-direction:column;align-items:stretch">' +
        '<div class="cluster" style="justify-content:space-between;align-items:baseline;gap:var(--space-2)">' +
        '<span><span class="rec-handle" style="font-size:var(--text-sm)">@u-' + esc(p.handle) + '</span>' + seatBadge(p.seat) + '</span>' +
        '<span class="citation">' + esc(p.when) + '</span></div>' +
        '<p style="margin-block:var(--space-1)">' + esc(p.body) + '</p>' +
        '<div class="cluster" style="justify-content:space-between;gap:var(--space-2)">' +
        '<span>' + tagChips(p.tags) + '</span>' + roomLink + '</div></article>';
    }

    function render() {
      var entries = [
        { kind: 'v1', rel: 'civic/civic-home.html', icon: 'globe', title: 'The public square',
          note: 'Open resident discussion — pseudonymous, and governed by your jurisdiction’s community standards.' },
        { kind: 'v2', rel: 'shared/live-room.html?variant=townhall', icon: 'landmark', title: 'The halls of governance',
          note: 'Speak into the public record at a hearing, a town hall, or a floor session.' },
        { kind: 'v2', rel: 'groups/groups-home.html', icon: 'message-square', title: 'Messages & parties',
          note: 'Direct messages and temporary parties — talk, files, voice, and video. Private to you, never federated.' }
      ];
      var cards = entries.map(function (e) {
        var href = e.kind === 'v1' ? S.hrefV1(e.rel) : S.hrefV2(e.rel);
        var tag = e.kind === 'v1' ? '' : '';
        var planned = (e.kind === 'v2' && !S.isBuiltV2(e.rel)) ? ' ' + S.plannedFlag('Stage 3') : '';
        return '<a class="role-card" href="' + href + '">' + S.icon(e.icon) +
          '<span class="role-name">' + esc(e.title) + tag + planned + '</span><span>' + esc(e.note) + '</span>' +
          '<span class="enter-as">Open ' + S.icon('arrow-right', { size: 'sm' }) + '</span></a>';
      }).join('');

      var posts = feed.map(postRow).join('');

      document.getElementById('social-root').innerHTML =
        '<header><span class="eyebrow">My civic life · the public square</span><h1>Social</h1>' +
        '<p class="page-intro">Where residents talk. Follow your neighbours and your representatives, ' +
        'read the square, send a message, and step into the halls when you want your words on the record. ' +
        'The square is for talk; <a href="' + S.hrefV2('economy/economy-home.html') + '">the exchange</a> is for trade — they never mix.</p></header>' +

        /* entry cards */
        '<section aria-labelledby="go-h"><h2 id="go-h">Where to go</h2><div class="role-grid">' + cards + '</div></section>' +

        /* who is in the halls right now — presence strip above the feed */
        presenceStrip() +

        /* the feed */
        '<section aria-labelledby="feed-h"><div class="cluster" style="justify-content:space-between;align-items:baseline">' +
        '<h2 id="feed-h">Recent in the square</h2>' +
        '<a class="btn btn--secondary btn--sm" href="' + S.hrefV1('civic/civic-home.html') + '">' +
        S.icon('globe', { size: 'sm' }) + ' Open the full square</a></div>' +
        '<div class="stack">' + posts + '</div>' +
        '<p class="lr-note" style="margin-block-start:var(--space-3)">' + S.icon('info', { size: 'sm' }) +
        ' A post is talk, not an act. To put words into the permanent public record, testify in the halls.</p></section>' +

        /* community standards — jurisdiction-scoped, plain; the constitutional
           "why" is tucked into a collapsible (learning material, not chrome). */
        '<section class="card" aria-labelledby="rights-h"><h2 id="rights-h">Community standards</h2>' +
        '<p>Every square belongs to a jurisdiction, and each sets its own community standards. Here, a post is only ever removed for these narrow reasons — never for the opinion it holds:</p>' +
        '<ul>' +
        '<li><strong>True threats &amp; incitement</strong> — speech that is itself a crime of violence, not an opinion.</li>' +
        '<li><strong>Targeted harassment</strong> — conduct aimed at silencing another resident, not a viewpoint.</li>' +
        '<li><strong>Privacy &amp; doxxing</strong> — publishing another person’s private identifying data.</li>' +
        '<li><strong>Vote &amp; ballot integrity</strong> — impersonation or fraud that corrupts an election.</li>' +
        '</ul>' +
        '<p class="lr-note">' + S.icon('shield', { size: 'sm' }) +
        ' <span><strong>Pseudonymous by default.</strong> You speak as your <span class="rec-handle">@u-handle</span>, ' +
        'never your legal name. Seated representatives may add a seat badge so neighbours can recognise them — a choice, not a requirement.</span></p>' +
        '<details class="learn-inline"><summary>Why these are the only limits</summary>' +
        '<p class="gloss">Speaking freely in the square is a guaranteed right. That is why no operator, moderator, or even a new law can take a post down for what it says — the only removals are the few content-neutral limits above, and every one of them is logged. You can read the full grounding in the learn panel below.</p></details>' +
        '</section>';

      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }
    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
