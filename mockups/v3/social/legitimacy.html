<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reach — World of Statecraft mockups · v3</title>
  <link rel="icon" href="../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main"><div class="stack" id="root"><p class="gloss">Loading…</p></div></main>
  <script>
    window.CGA_PAGE = { id: 'social/legitimacy', title: 'Reach', module: 'social', nav: 'legitimacy', citation: 'Reach gauge · a signal, never a governance input', register: 'governance' };
  </script>
  <script src="../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../manifest.js"></script>
  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var S = window.CGA.shellV2, V2 = window.CGA.fixtures.v2, esc = S.esc, L = V2.legitimacy;
    var TP = L.tierParams;
    /* the selected jurisdiction (in-page state; defaults to the sample) */
    var selected = (L.sample && L.sample.slug) || (L.jurisdictions[0] && L.jurisdictions[0].slug);

    function fmt(n) { return n == null ? '—' : Number(n).toLocaleString('en-US'); }

    /* the tier threshold — clamp(ceil(k·pop^(1/exponent)), floor, cap) */
    function tierThreshold(pop) {
      return Math.max(TP.floor, Math.min(TP.cap, Math.ceil(TP.k * Math.pow(pop, 1 / TP.exponent))));
    }

    /* an inline sparkline path from the reachPct series (display-cap aware) */
    function sparkPath(arr, w, h) {
      var capped = arr.map(function (v) { return Math.min(v, 100); });
      var min = Math.min.apply(null, capped), max = Math.max.apply(null, capped), range = (max - min) || 1;
      return capped.map(function (v, i) {
        var x = arr.length > 1 ? (i / (arr.length - 1)) * w : w / 2;
        var y = h - ((v - min) / range) * (h - 6) - 3;
        return (i ? 'L' : 'M') + x.toFixed(1) + ' ' + y.toFixed(1);
      }).join(' ');
    }

    /* ---- the reach gauge for one jurisdiction, with HONEST semantics ---- */
    function gaugeHtml(j) {
      /* unmeasurable: no population estimate → never 0% */
      if (j.populationEstimate == null) {
        return gaugeShell(j, 'unmeasurable', '<span class="pill pill--info">No estimate</span>',
          '<p class="gloss" style="margin-block:var(--space-2)">There is no population estimate for this place, so reach can’t be measured here — it is never shown as 0%. ' +
          fmt(j.verifiedResidents) + ' residents are verified; there is simply nothing to divide by yet.</p>');
      }
      /* activating: the count is still too small to be safe to publish */
      if (j.suppressed || j.verifiedResidents == null) {
        return gaugeShell(j, 'activating', '<span class="pill pill--wait">Waking up</span>',
          '<p class="gloss" style="margin-block:var(--space-2)">This place is just waking up. The count of verified residents is still small enough that publishing it could point at individual people — so no number, and no curve, is shown yet. Both appear once enough residents are verified to be safe to count.</p>');
      }
      /* measured: cap the bar at 100% but show the raw value when over the cap */
      var raw = j.reachPct;
      var shown = j.displayCap != null ? Math.min(raw, j.displayCap) : raw;
      var capped = j.displayCap != null && raw > j.displayCap;
      var fillPct = Math.min(shown, 100);
      var tierPill = j.tier ? '<span class="pill pill--pass">' + esc(j.tier) + '</span>' : '';
      var meter = '<div class="meter-block" style="margin-block:var(--space-2)">' +
        '<div class="meter" role="meter" aria-valuemin="0" aria-valuemax="100" aria-valuenow="' + fillPct.toFixed(1) + '" aria-label="Reach — verified residents as a share of the population estimate, shown up to 100 percent">' +
        '<span class="meter-fill' + (fillPct >= 100 ? ' meter-fill--met' : '') + '" style="inline-size:' + fillPct + '%"></span></div>' +
        '<div class="meter-caption"><span>' + fmt(j.verifiedResidents) + ' verified residents</span>' +
        '<span>of ' + fmt(j.populationEstimate) + (j.provenance ? ' · ' + esc(j.provenance) + (j.populationYear ? ' ' + j.populationYear : '') : '') + '</span></div></div>';
      var bignum = '<div class="stat" style="margin-block:var(--space-2)"><span class="stat-number" style="color:var(--cc-gold-400)">' +
        (capped ? '100%' : raw + '%') + '</span><span class="stat-label">reach</span></div>';
      var capNote = capped
        ? '<p class="citation">Shown as 100% — the raw figure is ' + raw + '% (more verified residents than the estimate; the estimate lags this place).</p>'
        : '<p class="citation">Verified residents as a share of the population estimate · updated nightly · small counts are hidden to protect people.</p>';
      return gaugeShell(j, 'measured', tierPill, bignum + meter, capNote);
    }
    function gaugeShell(j, state, pill, body, footNote) {
      return '<section class="card"><div class="cluster" style="justify-content:space-between;align-items:baseline">' +
        '<span class="eyebrow">' + S.icon('map', { size: 'sm' }) + ' ' + esc(j.name) + '</span>' + (pill || '') + '</div>' +
        body +
        (footNote || '') +
        '</section>';
    }

    /* ---- the time-series spark for the selected jurisdiction ---- */
    function seriesHtml(j) {
      if (!j.snapshots || !j.snapshots.length) {
        return '<section class="card"><span class="eyebrow">' + S.icon('bar-chart', { size: 'sm' }) + ' Reach over time</span>' +
          '<p class="gloss" style="margin-block-start:var(--space-2)">' +
          (j.populationEstimate == null
            ? 'No curve — reach can’t be measured without a population estimate.'
            : 'No curve yet — small counts are hidden to protect people until enough residents are verified.') +
          '</p></section>';
      }
      var pcts = j.snapshots.map(function (p) { return p.reachPct; });
      var first = j.snapshots[0], last = j.snapshots[j.snapshots.length - 1];
      var days = j.snapshots.length;
      var w = 280, h = 60;
      var spark = '<svg class="legit-spark" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" role="img" ' +
        'aria-label="Reach trend for ' + esc(j.name) + ' over the last ' + days + ' days, from ' + first.reachPct + ' percent to ' + last.reachPct + ' percent">' +
        '<path d="' + sparkPath(pcts, w, h) + '" /></svg>';
      var delta = +(last.reachPct - first.reachPct).toFixed(2);
      var deltaTone = delta > 0 ? 'pass' : (delta < 0 ? 'wait' : 'info');
      return '<section class="card"><div class="cluster" style="justify-content:space-between;align-items:baseline">' +
        '<span class="eyebrow">' + S.icon('bar-chart', { size: 'sm' }) + ' Reach over time</span>' +
        '<span class="pill pill--' + deltaTone + '">' + (delta > 0 ? '+' : '') + delta + ' pts over ' + days + ' days</span></div>' +
        spark +
        '<div class="cluster" style="justify-content:space-between;margin-block-start:var(--space-1)">' +
        '<span class="citation tier-readout">' + first.reachPct + '% · day −' + (days - 1) + '</span>' +
        '<span class="citation tier-readout">' + last.reachPct + '% · today</span></div>' +
        '<p class="citation">Nightly snapshots · on any night the count is too small to be safe, the curve stays hidden.</p></section>';
    }

    /* ---- the jurisdiction picker ---- */
    function pickerHtml() {
      var opts = L.jurisdictions.map(function (j) {
        return '<option value="' + esc(j.slug) + '"' + (j.slug === selected ? ' selected' : '') + '>' + esc(j.name) + '</option>';
      }).join('');
      return '<div class="field" style="max-inline-size:24rem"><label class="field-label" for="jur-pick">Jurisdiction</label>' +
        '<select class="select" id="jur-pick" aria-label="Choose a jurisdiction">' + opts + '</select></div>';
    }

    /* ---- when can a place start its government? plain view + a machinery drawer */
    function tierConsoleHtml(j) {
      /* the selected jurisdiction paired against its own threshold */
      var pairing = '';
      if (j.populationEstimate != null) {
        var thr = tierThreshold(j.populationEstimate);
        var have = j.verifiedResidents;
        if (have == null) {
          pairing = '<p class="lr-note">' + S.icon('info', { size: 'sm' }) +
            ' <span><strong>' + esc(j.name) + '</strong> needs <strong>' + thr + '</strong> verified residents before its first government can start — the current count is still hidden to protect people, so the remaining number is not shown.</span></p>';
        } else {
          var more = Math.max(0, thr - have);
          pairing = '<div class="lr-note"><div>' + S.icon('landmark', { size: 'sm' }) + '</div><div>' +
            '<strong style="color:var(--gov-fg)">' + esc(j.name) + ':</strong> <span class="tier-readout">' + fmt(have) + '</span> verified of the <span class="tier-readout">' + thr + '</span> needed → ' +
            (more === 0
              ? '<span class="pill pill--pass">' + S.icon('check', { size: 'sm' }) + ' threshold met — a government may start</span>'
              : '<span class="pill pill--wait">' + fmt(more) + ' more to go</span>') +
            '</div></div>';
        }
      } else {
        pairing = '<p class="lr-note">' + S.icon('info', { size: 'sm' }) +
          ' <span><strong>' + esc(j.name) + '</strong> has no population estimate, so no starting threshold can be computed here.</span></p>';
      }

      var stateRow = TP.enabled
        ? '<span class="pill pill--pass">' + S.icon('check', { size: 'sm' }) + ' Switched on</span>'
        : '<span class="pill pill--info">Not switched on here yet</span>';

      /* the machinery — formula, parameters, and the curve — lives in a drawer */
      var rows = TP.samplePops.map(function (pop) {
        return '<tr><td class="tier-readout">' + fmt(pop) + '</td>' +
          '<td class="tier-readout">' + tierThreshold(pop) + '</td>' +
          '<td class="citation">ceil(' + TP.k + ' × ' + fmt(pop) + '<sup>1/' + TP.exponent + '</sup>) → clamp [' + TP.floor + ', ' + TP.cap + ']</td></tr>';
      }).join('');
      var table = '<table class="table"><caption class="visually-hidden">Starting threshold by population</caption>' +
        '<thead><tr><th>Population</th><th>Verified needed to start</th><th>How it is computed</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table>';
      var drawer = '<details class="learn-inline" style="margin-block-start:var(--space-3)"><summary>How the threshold is computed</summary>' +
        '<div class="grid-2" style="margin-block:var(--space-3)">' +
        paramCard('k (coefficient)', String(TP.k)) +
        paramCard('exponent', '1 / ' + TP.exponent + ' (cube-root by default)') +
        paramCard('floor', String(TP.floor) + ' verified') +
        paramCard('cap', String(TP.cap) + ' verified') +
        '</div>' +
        '<p class="cc-small">For each population, the threshold is <code class="cc-code">clamp(ceil(k · pop<sup>1/exponent</sup>), floor, cap)</code> — the cube-root (mirroring Taagepera’s work on assembly sizes) means a giant city and a hamlet both land on a sane, bounded number. Below the threshold, small counts are also hidden from every public gauge (a k-anonymity floor).</p>' +
        table +
        '<p class="citation">' + esc(TP.devDefaultNote) + '</p>' +
        '</details>';

      return '<section class="card"><div class="cluster" style="justify-content:space-between;align-items:baseline">' +
        '<h2 style="margin:0">When can a place start its government?</h2>' + stateRow + '</div>' +
        '<p class="page-intro">A place needs a handful of verified residents before its <strong>first government</strong> can start. That threshold gates only the very first activation — never anyone’s vote, ballot, or right to stand.</p>' +
        pairing +
        drawer +
        '<div class="lr-note" style="margin-block-start:var(--space-3)"><div>' + S.icon('shield', { size: 'sm' }) + '</div><div>' +
        '<strong style="color:var(--gov-fg)">It gates a start, never a person.</strong> ' + esc(TP.rail) + '</div></div>' +
        '</section>';
    }
    function paramCard(label, value) {
      return '<div class="card card--inset"><span class="eyebrow">' + esc(label) + '</span>' +
        '<div class="tier-readout" style="font-size:var(--text-lg);color:var(--gov-fg-strong);margin-block-start:var(--space-1)">' + esc(value) + '</div></div>';
    }

    function render() {
      var j = L.byJur[selected] || L.jurisdictions[0];
      var rails = L.rails.map(function (r) { return '<li>' + esc(r) + '</li>'; }).join('');

      document.getElementById('root').innerHTML =
        '<header><span class="eyebrow">Government with people · reach</span><h1>Reach</h1>' +
        '<p class="page-intro">How many of this place’s people are actually here and verified, as a share of its population — so a hamlet and a metropolis are measured on equal footing. It is a signal of how alive a place is, and nothing more.</p></header>' +
        '<div class="lr-note"><div>' + S.icon('map', { size: 'sm' }) + '</div><div>Reach is part of every place’s data — you can see it right in the <a href="' + S.hrefV2('jurisdictions/jurisdiction-browser.html') + '">jurisdiction view</a>. This page is the detailed panel: the trend over time, and when a place can start its government.</div></div>' +
        S.plannedBanner('This gauge is proposed for this world — the numbers below are sample data.') +
        '<div class="lr-note"><div>' + S.icon('shield', { size: 'sm' }) + '</div><div>' +
        '<strong style="color:var(--gov-fg)">A gauge, never a lever.</strong> ' + esc(L.note) + '</div></div>' +
        /* picker + gauge + series */
        '<section aria-labelledby="gauge-h"><h2 id="gauge-h">Reach for a place</h2>' +
        pickerHtml() +
        '<div class="grid-2">' + gaugeHtml(j) + seriesHtml(j) + '</div></section>' +
        /* when can a place start its government? */
        tierConsoleHtml(j) +
        /* the fences */
        '<section class="card"><h2>The fences around this number</h2><p class="page-intro">Reach is the most temptation-prone number in the system — so it is fenced:</p><ul>' + rails + '</ul></section>' +
        /* what it is used for */
        '<section class="card"><span class="eyebrow">What it is used for</span><ul>' +
        '<li><strong>A transparency badge</strong> on the place and its public square.</li>' +
        '<li><strong>Starting a government</strong> — a place’s first government can start once enough residents are verified. It gates only that start, never anyone’s vote.</li>' +
        '<li><strong>Milestones</strong> — a place crossing 25%, 50%, or 75% reach is celebrated, never advantaged.</li>' +
        '</ul></section>';

      var sel = document.getElementById('jur-pick');
      if (sel) sel.addEventListener('change', function () {
        selected = sel.value;
        var nm = (L.byJur[selected] || {}).name || selected;
        S.announce('Showing reach for ' + nm);
        render();
      });
      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }
    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
