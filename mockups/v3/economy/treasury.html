<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Public finance — World of Statecraft mockups · v3</title>
  <link rel="icon" href="../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main">
    <div class="stack" id="econ-root"><p class="gloss">Loading public finance…</p></div>
  </main>
  <script>
    window.CGA_PAGE = { id: 'economy/treasury', title: 'Public finance', module: 'economy', nav: 'treasury', citation: 'Public finance — the public ledger', register: 'governance' };
  </script>
  <script src="../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../assets/js/fixtures-econ.js"></script>
  <script src="../manifest.js"></script>
  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var S = window.CGA.shellV2, V2 = window.CGA.fixtures.v2, E = V2.econ, esc = S.esc;

    /* the budget cycle as a horizontal lifecycle / stepper */
    function cycleStepper() {
      var steps = E.treasury.cycle.map(function (st, i) {
        // form-chip: the step's own short label (never a truncated sentence)
        var chip = st.form
          ? '<span class="form-chip">' + esc(st.chipLabel || st.step) + '</span>'
          : '<span class="pill pill--info" title="a derived consequence">derived step</span>';
        return '<li class="lever-row" style="flex-direction:column;align-items:flex-start;border-inline-start:3px solid var(--gov-primary);padding-inline-start:var(--space-3)">' +
          '<div class="cluster" style="gap:var(--space-2)"><span class="form-id" style="border:1px solid var(--gov-border-strong)">' + (i + 1) + '</span>' +
          '<strong style="color:var(--gov-fg)">' + esc(st.step) + '</strong></div>' +
          '<span class="gloss">' + esc(st.detail) + '</span>' + chip + '</li>';
      }).join('<li aria-hidden="true" class="rail-arrow" style="align-self:center;color:var(--gov-fg-subtle)">' + S.icon('arrow-right', { size: 'sm' }) + '</li>');
      return '<ol class="journey-rail" style="flex-direction:column;align-items:stretch;gap:var(--space-2)" aria-label="The budget cycle">' + steps + '</ol>';
    }

    function ledgerRows() {
      return E.publicLedger.map(function (r) {
        var tone = r.kind === 'ubi' ? 'info' : r.kind === 'revenue' ? 'success' : r.kind === 'borrowing' ? 'warning' : 'neutral';
        return '<tr>' +
          '<td style="font-family:var(--font-mono)">' + esc(r.seq) + '</td>' +
          '<td>' + esc(r.date) + '</td>' +
          '<td>' + esc(r.debit) + '</td>' +
          '<td>' + esc(r.credit) + '</td>' +
          '<td style="text-align:end;font-variant-numeric:tabular-nums;white-space:nowrap">' + esc(r.amount) + '</td>' +
          '<td>' + S.badge(tone, r.kind) + '</td>' +
          '<td style="font-family:var(--font-mono);color:var(--gov-fg-subtle)">' + esc(r.hash) + '</td>' +
          '</tr>';
      }).join('');
    }

    function accountRows() {
      return E.accounts.map(function (a) {
        var pub = !!a.public;
        return '<tr>' +
          '<td>' + esc(a.owner) + '</td>' +
          '<td>' + S.pill(pub ? 'info' : 'closed', a.kind, 'account owner type') + '</td>' +
          '<td style="text-align:end;font-variant-numeric:tabular-nums;font-family:var(--font-mono)">' + esc(a.balance) + '</td>' +
          '<td>' + (pub
            ? S.badge('success', 'Public', 'globe')
            : S.badge('neutral', 'Private', 'lock')) + '</td>' +
          '</tr>';
      }).join('');
    }

    function budgetRows() {
      return E.treasury.budget.lines.map(function (l) {
        return '<tr><td>' + esc(l.name) + '</td>' +
          '<td style="text-align:end;font-variant-numeric:tabular-nums;font-family:var(--font-mono)">' + esc(l.amount) + '</td></tr>';
      }).join('');
    }

    function revenueCards() {
      return E.treasury.revenue.map(function (r) {
        return '<div class="card card--inset"><strong style="color:var(--gov-fg)">' + esc(r.name) + '</strong>' +
          '<div class="lever-val">' + esc(r.rate) + '</div>' +
          '<p class="gloss">' + esc(r.base) + '</p>' +
          (r.civicExempt ? S.badge('info', 'Never on a civic right', 'shield') : '') +
          '</div>';
      }).join('');
    }

    function borrowingCards() {
      return E.treasury.borrowing.map(function (b) {
        return '<div class="card card--inset"><div class="cluster" style="justify-content:space-between;gap:var(--space-2)">' +
          '<strong style="color:var(--gov-fg)">' + esc(b.name) + '</strong>' +
          S.pill('wait', 'Gated', 'a legislative act — two doors must open: the chamber and its constituents') + '</div>' +
          '<div class="lever-val">' + esc(b.amount) + '</div>' +
          '<p class="gloss">' + esc(b.basis) + '</p>' +
          '<div class="cluster" style="gap:var(--space-2)"><span class="form-chip">Borrowing authority</span>' +
          S.pill('info', b.status, 'drawdown against the authorized facility') + '</div></div>';
      }).join('');
    }

    function render() {
      var clk = E.economicClock;
      var bud = E.treasury.budget;

      document.getElementById('econ-root').innerHTML =
        '<header><span class="eyebrow">The economy · public finance</span><h1>Public finance</h1>' +
        '<p class="page-intro">How a jurisdiction raises, budgets, and spends money — entirely in the open. ' +
        'Revenue flows in, the legislature enacts a budget, the Board of Governors disburse it, and every movement lands in the ' +
        '<strong>public ledger</strong>: double-entry, append-only, and hash-chained, on the same audit chain as the rest of the record. ' +
        'Jurisdiction and department accounts are public; people and organizations keep their own ledgers private.</p></header>' +
        S.plannedBanner() +

        /* the budget cycle */
        '<section class="card" aria-labelledby="cyc-h"><h2 id="cyc-h">The budget cycle</h2>' +
        '<p class="gloss">A single journey from revenue to record. Each step names the act that performs it.</p>' +
        cycleStepper() +
        '<p class="lr-note" style="margin-block-start:var(--space-3)">' + S.icon('alert-triangle', { size: 'sm' }) +
        '<span>' + esc(E.treasury.rail) + '</span></p></section>' +

        /* the public ledger */
        '<section class="card" aria-labelledby="led-h"><h2 id="led-h">The public ledger</h2>' +
        '<p class="gloss">Every public movement, newest first. <strong>Double-entry</strong> — each row names a debit and a credit, so every unit out of one account lands in another and the books always balance. <strong>Append-only and hash-chained</strong> — a row can never be edited or deleted; each carries the hash that links it to the one before.</p>' +
        '<div class="table-wrap"><table class="table"><thead><tr>' +
        '<th scope="col">Seq</th><th scope="col">Date</th><th scope="col">Debit</th><th scope="col">Credit</th>' +
        '<th scope="col" style="text-align:end">Amount</th><th scope="col">Kind</th><th scope="col">Hash</th>' +
        '</tr></thead><tbody>' + ledgerRows() + '</tbody></table></div>' +
        '<p class="citation">Append-only, hash-chained records · same audit chain as <a href="' + S.hrefV1('system/public-records.html') + '">public records</a></p></section>' +

        /* public accounts */
        '<section class="card" aria-labelledby="acc-h"><h2 id="acc-h">The accounts</h2>' +
        '<p class="gloss">Jurisdiction and department accounts are <strong>public</strong> — anyone may inspect the balance and the movements that produced it. Individual and organization accounts are <strong>private</strong> — like a ballot, only the owner can read them.</p>' +
        '<div class="table-wrap"><table class="table"><thead><tr>' +
        '<th scope="col">Account</th><th scope="col">Owner</th><th scope="col" style="text-align:end">Balance</th><th scope="col">Visibility</th>' +
        '</tr></thead><tbody>' + accountRows() + '</tbody></table></div></section>' +

        /* budget lines */
        '<section class="card" aria-labelledby="bud-h"><h2 id="bud-h">Budget ' + esc(bud.year) + '</h2>' +
        '<p class="gloss">The enacted budget for the cycle. Enacting it spawns the appropriations that give each department its spending authority.</p>' +
        '<div class="table-wrap"><table class="table"><thead><tr>' +
        '<th scope="col">Budget line</th><th scope="col" style="text-align:end">Appropriation</th>' +
        '</tr></thead><tbody>' + budgetRows() +
        '<tr><td style="font-weight:var(--weight-bold)">Total</td>' +
        '<td style="text-align:end;font-weight:var(--weight-bold);font-family:var(--font-mono)">' + esc(bud.total) + '</td></tr>' +
        '</tbody></table></div>' +
        '<div class="cluster" style="gap:var(--space-2);margin-block-start:var(--space-2)">' +
        '<span class="form-chip">Enact the budget</span>' +
        '<span class="form-chip">Disburse an appropriation</span></div></section>' +

        /* revenue + borrowing */
        '<section class="grid-2" aria-label="Revenue and borrowing">' +
        '<div class="card"><h2>Revenue</h2>' +
        '<p class="gloss">Levies and fees on resources and assessed value — apportioned via the population records, never attached to a civic right.</p>' +
        '<div class="stack">' + revenueCards() + '</div>' +
        '<div class="cluster" style="margin-block-start:var(--space-2)"><span class="form-chip">Set a revenue levy</span></div></div>' +
        '<div class="card"><h2>Borrowing</h2>' +
        '<p class="gloss">A jurisdiction may borrow on its own credit — but only as a gated legislative act, never an administrative drawdown.</p>' +
        '<div class="stack">' + borrowingCards() + '</div></div>' +
        '</section>' +

        /* the economic clock context */
        '<div class="econ-clock"><div class="clock-dial">' + S.icon('refresh-cw') + '</div>' +
        '<div><strong style="color:var(--gov-fg)">The disbursement cadence</strong> — ' + esc(clk.label) + '. ' +
        '<span class="citation">next run ' + esc(clk.nextRun) + '</span><br />' +
        '<span class="gloss">The Board of Governors execute the budget on this clock. The interval is itself set by law — two doors must open to change it.</span></div></div>' +

        /* the no-paywall rail */
        '<section class="card" aria-labelledby="rails-h"><h2 id="rails-h">The rails that hold everywhere</h2><ul>' +
        '<li><strong>No paywall on civic rights.</strong> No tax, fee, lien, or cost may ever attach to voting, candidacy, residency, or petitioning — a budget line or levy that does so is rejected.</li>' +
        '<li><strong>The public ledger is append-only and hash-chained.</strong> A movement can never be edited or removed; corrections are new, balancing entries.</li>' +
        '<li><strong>The Board of Governors execute, they do not authorize.</strong> Spending authority comes from the enacted budget; the executive only disburses against it.</li>' +
        '<li><strong>Taxes and borrowing are legislative acts.</strong> Revenue is set, and credit drawn, only by the legislature — never an admin knob.</li>' +
        '<li><strong>Currency stays root-reserved.</strong> Only the most-encompassing jurisdiction issues it and sets its worth.</li>' +
        '<li><strong>Individual finances are private.</strong> Wallets, receipts, and tax filings are readable only by their owners — like ballots.</li>' +
        '</ul><p class="citation">Why public money works this way lives in the Learn drawer · ' +
        '<a href="' + S.hrefV2('economy/economy-home.html') + '">Back to the economy ' + S.icon('arrow-right', { size: 'sm' }) + '</a></p></section>';

      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }
    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
