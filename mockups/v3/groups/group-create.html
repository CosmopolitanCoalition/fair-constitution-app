<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New message or party — CGA mockups v3</title>
  <link rel="icon" href="../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main"><div class="stack" id="root"><p class="gloss">Loading…</p></div></main>
  <script>
    window.CGA_PAGE = { id: 'groups/group-create', title: 'New message or party', module: 'groups', nav: 'groups', register: 'governance' };
  </script>
  <script src="../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../manifest.js"></script>
  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var S = window.CGA.shellV2, esc = S.esc;
    function render() {
      document.getElementById('root').innerHTML =
        '<header><span class="eyebrow">People, together · start a conversation</span><h1>New message or party</h1>' +
        '<p class="page-intro">Message one person, or start a party with a few. A party is just a temporary group — talk, files, voice, and video. You can do this from anywhere you see someone, the same way you would on any social app.</p></header>' +
        '<section class="card"><form id="c-form" novalidate>' +
        '<fieldset class="field" style="border:0;padding:0;margin-inline:0"><legend class="field-label">Who is this with</legend>' +
        '<p class="cc-small">Add one person for a direct message, or several for a party.</p>' +
        '<div class="cluster" style="gap:var(--space-2);flex-wrap:wrap" id="people">' +
        '<span class="party-chip">@u-pier7 <button type="button" class="chip-x" data-rm aria-label="remove">' + S.icon('x', { size: 'sm' }) + '</button></span>' +
        '<span class="party-chip">@u-greenwood <button type="button" class="chip-x" data-rm aria-label="remove">' + S.icon('x', { size: 'sm' }) + '</button></span>' +
        '</div>' +
        '<div class="cluster" style="gap:var(--space-2);margin-block-start:var(--space-2)">' +
        '<input class="field-input" id="c-add" type="text" placeholder="Add by @handle…" autocomplete="off" />' +
        '<button type="button" class="btn btn--secondary btn--sm" id="c-add-btn">' + S.icon('plus', { size: 'sm' }) + ' Add</button></div></fieldset>' +
        '<div class="field"><label class="field-label" for="c-name">Name (optional, for a party)</label>' +
        '<input class="field-input" id="c-name" type="text" placeholder="e.g. Saturday crew" /></div>' +
        '<div class="cluster" style="margin-block-start:var(--space-4)"><button type="submit" class="btn btn--primary">' + S.icon('message-square', { size: 'sm' }) + ' Start the conversation</button>' +
        '<a class="btn btn--ghost" href="' + S.hrefV2('groups/groups-home.html') + '">Cancel</a></div>' +
        '<p id="c-confirm" role="status" class="gloss" style="margin-block-start:var(--space-2)"></p>' +
        '</form></section>' +
        '<div class="lr-note"><div>' + S.icon('shield', { size: 'sm' }) + '</div><div>' +
        '<strong style="color:var(--gov-fg)">A party is temporary and private.</strong> It confers no governance power, who is in it is private to each member, and it never federates. When everyone leaves, it is gone. If a party wants to last, it can become an organization — but it never has to.</div></div>';

      var people = document.getElementById('people');
      document.getElementById('c-add-btn').addEventListener('click', function () {
        var inp = document.getElementById('c-add'); var v = (inp.value || '').trim(); if (!v) return;
        if (v.charAt(0) !== '@') v = '@' + v;
        var span = document.createElement('span'); span.className = 'party-chip';
        span.innerHTML = esc(v) + ' <button type="button" class="chip-x" data-rm aria-label="remove">' + S.icon('x', { size: 'sm' }) + '</button>';
        people.appendChild(span); inp.value = '';
      });
      people.addEventListener('click', function (ev) { var b = ev.target.closest('[data-rm]'); if (b) b.parentNode.remove(); });
      document.getElementById('c-form').addEventListener('submit', function (ev) {
        ev.preventDefault();
        var n = people.querySelectorAll('.party-chip').length;
        var name = (document.getElementById('c-name').value || '').trim();
        var label = n > 1 ? (name || 'New party') + ' started with ' + n + ' people' : 'Direct message started';
        document.getElementById('c-confirm').textContent = label + ' (simulated) — opening the conversation.';
        S.announce(label);
      });
      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }
    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
