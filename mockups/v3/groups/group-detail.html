<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conversation — World of Statecraft mockups · v3</title>
  <link rel="icon" href="../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main"><div class="stack" id="root"><p class="gloss">Loading the conversation…</p></div></main>
  <script>
    window.CGA_PAGE = { id: 'groups/group-detail', title: 'Conversation', module: 'groups', nav: 'groups', register: 'governance' };
  </script>
  <script src="../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../manifest.js"></script>
  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script src="../assets/js/messages-v2.js"></script>
  <script>
  (function () {
    'use strict';
    function convId() { try { return new URLSearchParams(location.search).get('id') || 'party-harbor'; } catch (e) { return 'party-harbor'; } }
    var root = document.getElementById('root');
    function render() {
      root.innerHTML =
        '<header><span class="eyebrow">People, together · a conversation</span></header>' +
        CGA.messagesV2.thread(convId());
      CGA.messagesV2.wire(root);
      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }
    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
