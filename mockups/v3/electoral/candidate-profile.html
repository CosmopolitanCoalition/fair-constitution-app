<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <title>Moved — World of Statecraft</title>
  <link rel="canonical" href="../social/profile.html?who=diego-ramos&amp;tab=candidacy" />
  <script>
    /* One person = one profile: the candidate page is now the Candidacy tab of
       the unified profile. Forward the deep-link params this page honored:
       ?candidate=<id>[&name=<display>][&race=<election id>]  ->  ?who=&name=&race=&tab=candidacy */
    (function () {
      var q = new URLSearchParams(window.location.search);
      var hash = new URLSearchParams(window.location.hash.replace(/^#/, '?'));
      function p(k) { return q.get(k) || hash.get(k); }
      var t = new URLSearchParams();
      t.set('who', p('candidate') || 'diego-ramos');
      if (p('name')) t.set('name', p('name'));
      if (p('race')) t.set('race', p('race'));
      t.set('tab', 'candidacy');
      window.location.replace('../social/profile.html?' + t.toString());
    })();
  </script>
  <noscript><meta http-equiv="refresh" content="0; url=../social/profile.html?who=diego-ramos&amp;tab=candidacy" /></noscript>
</head>
<body>
  <main><h1>This page moved</h1><p>A candidate page is the <a href="../social/profile.html?who=diego-ramos&amp;tab=candidacy">Candidacy tab of the one profile</a> now.</p></main>
</body>
</html>
