<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Found the instance — World of Statecraft mockups · v3</title>
  <link rel="icon" href="../assets/img/social-square-purple.png" />
  <link rel="stylesheet" href="../assets/css/colors_and_type.css" />
  <link rel="stylesheet" href="../assets/css/mockup.css" />
  <link rel="stylesheet" href="../assets/css/v2.css" />
  <script src="../assets/js/demo-state.js"></script>
</head>
<body>
  <main id="main"><div class="stack" id="root"><p class="gloss">Loading the founding loop…</p></div></main>
  <script>
    window.CGA_PAGE = { id: 'system/setup', title: 'Found the instance', module: 'system', nav: 'founding', register: 'governance' };
  </script>
  <script src="../assets/js/fixtures.js"></script>
  <script src="../assets/js/fixtures-v2.js"></script>
  <script src="../manifest.js"></script>
  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/shell-v2.js"></script>
  <script>
  (function () {
    'use strict';
    var S = window.CGA.shellV2, esc = S.esc;
    /* The founding flow, reordered (v3): your operator account first, then a
       one-way choice — JOIN a federation (nothing to found) or START FROM
       SCRATCH (found a world). The scratch path ends by creating your first
       federation account — your player username, player one. */
    var STEPS = ['Operator account', 'Join or start fresh', 'Cosmic address', 'Constitution & economy', 'Map data', 'Build districts', 'Seat & your account'];

    var fseq = 0;
    function field(label, value, hint, opts) {
      opts = opts || {}; var id = 'f' + (++fseq);
      var input = opts.select
        ? '<select class="select" id="' + id + '">' + opts.select.map(function (o) { return '<option>' + esc(o) + '</option>'; }).join('') + '</select>'
        : '<input class="field-input" id="' + id + '" type="' + (opts.type || 'text') + '" value="' + esc(value) + '" />';
      return '<div class="field"><label class="field-label" for="' + id + '">' + esc(label) + '</label>' + input +
        (hint ? '<span class="field-hint citation">' + esc(hint) + '</span>' : '') + '</div>';
    }
    function grp(title, fields) { return '<div class="card card--inset"><h3>' + esc(title) + '</h3><div class="grid-2">' + fields + '</div></div>'; }
    function etlBar(label, n, unit, pop) {
      return '<div class="etl-row"><div class="etl-bar"><span class="etl-fill' + (pop ? ' etl-fill--pop' : '') + '" style="inline-size:100%"></span></div>' +
        '<div class="meter-caption"><span>' + esc(label) + '</span><span data-no-i18n>' + esc(n) + ' / ' + esc(n) + ' ' + esc(unit) + ' (100%)</span></div></div>';
    }
    function tile(n, label) { return '<div class="stat-tile"><span class="n" data-no-i18n>' + esc(n) + '</span><span class="citation">' + esc(label) + '</span></div>'; }
    function stepHead(i, extra) {
      return '<div class="cluster" style="gap:var(--space-2)"><span class="setup-n">' + i + '</span>' +
        '<h2 id="s' + i + '" style="margin:0">' + esc(STEPS[i]) + '</h2>' + (extra || '') + '</div>';
    }

    /* 0 — your operator account (you are a physical node) */
    function stepOperator() {
      return '<section class="card setup-step" aria-labelledby="s0">' + stepHead(0) +
        '<p>Before anything else, claim <strong>your</strong> account. You are a person running a physical node — a box on the mesh. This account is who you are as the operator of this instance.</p>' +
        '<div class="card card--inset"><h3>' + S.icon('user', { size: 'sm' }) + ' Claim your operator account</h3>' +
        '<p>Your name, a contact email, this node’s name, and where it lives — claimed once, on ' +
        '<a href="' + S.hrefV2('operator/setup.html') + '">Set up your node</a>. This wizard embeds that exact step, so there is only ever one account-claim form.</p>' +
        '<a class="btn btn--secondary btn--sm" href="' + S.hrefV2('operator/setup.html') + '">Claim it in the node setup ' + S.icon('arrow-right', { size: 'sm' }) + '</a></div>' +
        '<div class="plane-wall"><span>' + S.icon('info', { size: 'sm' }) + '</span><div>' +
        '<strong style="color:var(--gov-fg)">Running the box has more to it.</strong> DNS, certificates, and mesh keys live there too — see ' +
        '<a href="' + S.hrefV2('operator/setup.html') + '">Set up your node</a>. That work and this founding flow are siblings; this step is just the account that ties them together.</div></div>' +
        '</section>';
    }

    /* 1 — the one-way binary: join, or start from scratch */
    function stepBranch() {
      return '<section class="card setup-step" aria-labelledby="s1">' + stepHead(1) +
        '<p>Now a single, one-way choice. <strong>Joining</strong> connects you to a world that already exists; <strong>starting fresh</strong> founds a brand-new one. The moment you start fresh you are a new, separate node — you can’t then join (you could later fork or disconnect, but that’s another story).</p>' +
        '<div class="grid-2" style="margin-block-start:var(--space-3)">' +
        '<div class="card card--inset"><div class="cluster" style="justify-content:space-between;align-items:baseline">' +
        '<h3>' + S.icon('globe', { size: 'sm' }) + ' Join a federation</h3>' + S.badge('info', 'Short path') + '</div>' +
        '<p>Connect to an existing federation. You inherit its constitution, its map, and its institutions — there is <strong>nothing to found</strong>. You finish at <a href="' + S.hrefV2('jurisdictions/federation.html') + '">federation-join</a>, where you enter your federation account and connect as a node.</p>' +
        '<p class="gloss">All the founding steps below are skipped.</p>' +
        '<button type="button" class="btn btn--secondary btn--sm" data-sim>Join a federation</button></div>' +
        '<div class="card card--inset" style="border-color:var(--gov-primary)"><div class="cluster" style="justify-content:space-between;align-items:baseline">' +
        '<h3>' + S.icon('sliders', { size: 'sm' }) + ' Start from scratch</h3>' + S.badge('success', 'Selected') + '</div>' +
        '<p>Found a brand-new world. You author the constitution and its economy, load the map, draw districts, and seat the institutions — the full founding loop below. The <strong>last</strong> step creates your first federation account: your player username, player one.</p>' +
        '<p class="gloss">Continue through the steps below.</p></div>' +
        '</div></section>';
    }

    /* 2 — cosmic address */
    function stepCosmic() {
      return '<section class="card setup-step" aria-labelledby="s2">' + stepHead(2) +
        '<p>Name your instance and set the cosmic address it federates under.</p>' +
        field('Instance name', 'United Earth', 'A friendly label — shown in nav and federation directories.') +
        '<p class="citation">Multiverse · Observable Universe · Laniakea Supercluster · Local Group · Milky Way · Orion Arm · Solar System · Earth (planet)</p>' +
        field('World', '', '', { select: ['Earth (planet)', 'Luna (moon) — future scope', 'New world…'] }) +
        '<h3 style="margin-block-start:var(--space-4)">Time mode</h3><div class="grid-2">' +
        '<div class="card card--inset" style="border-color:var(--gov-primary)"><strong style="color:var(--gov-fg)">Real-time</strong><br /><span class="gloss">Elections on the wall clock — a 5-year default cycle.</span></div>' +
        '<div class="card card--inset"><strong style="color:var(--gov-fg)">Accelerated</strong><br /><span class="gloss">Compressed simulation — pick seconds per simulated year.</span></div>' +
        '</div></section>';
    }

    /* 3 — constitution AND economy defaults (all of them, set once) */
    function stepDefaults() {
      return '<section class="card setup-step" aria-labelledby="s3">' + stepHead(3) +
        '<p>Author the defaults for your world — the constitutional settings <strong>and</strong> the economic ones. The Template’s suggested values are shown as reference; depart from them here as you like.</p>' +
        '<div class="lr-note"><div>' + S.icon('info', { size: 'sm' }) + '</div><div>' +
        '<strong style="color:var(--gov-fg)">Set once, inherited everywhere.</strong> Every default here becomes the inherited default for new child jurisdictions coming online — so they don’t reinvent the wheel. Each jurisdiction can still edit its own once its legitimacy gate activates.</div></div>' +
        grp('Legislature',
          field('Minimum seats per legislature', '5', 'Reference: 5', { type: 'number' }) +
          field('Maximum seats per legislature', '9', 'Reference: 9 (before mandatory subdivision)', { type: 'number' }) +
          field('Legislature sizing law', '', 'Total seats = round(population^⅓)', { select: ['Cube-Root Law'] }) +
          field('Max days between meetings', '90', 'Reference: 90', { type: 'number' })) +
        grp('Elections',
          field('Election interval (months)', '60', 'Reference: 60 (5 years)', { type: 'number' }) +
          field('Voting method', '', 'Replaceable only by a more proportional method', { select: ['STV with Droop Quota'] })) +
        grp('Governance thresholds',
          field('Supermajority (numerator / denominator)', '2 / 3', '≈ 66.7% · never below majority + 1', {}) +
          field('Emergency powers max duration (days)', '90', 'Reference: 90', { type: 'number' }) +
          field('Citizen initiative threshold (% of population)', '5', 'Reference: 5.00', { type: 'number' })) +
        grp('Appointments &amp; judiciary',
          field('Civil / judicial appointment term (years)', '10', 'Reference: 10, in lockstep', { type: 'number' }) +
          field('Minimum judges per race', '5', 'Reference: 5', { type: 'number' }) +
          '<div class="field"><span class="field-label">Judiciary selection</span>' +
          '<div class="radio-group"><label class="radio"><input type="radio" name="jud" checked /> Appointed</label>' +
          '<label class="radio"><input type="radio" name="jud" /> Elected</label></div></div>') +
        grp('Organizations &amp; workers',
          field('Worker rep — first seat (employees)', '100', 'Reference: 100', { type: 'number' }) +
          field('Worker / shareholder parity (employees)', '2000', 'Reference: 2000', { type: 'number' })) +
        /* the economic defaults — NEW: set every economic default here too */
        '<div class="card card--inset" style="border-color:var(--gov-primary)"><h3>' + S.icon('refresh-cw', { size: 'sm' }) + ' Economy defaults</h3>' +
        '<p class="gloss">The starting economy for your world — these cascade to child jurisdictions just like the constitutional ones.</p>' +
        '<div class="grid-2">' +
        field('Currency name', 'Civic Value Unit', 'The abstract unit of account.') +
        field('Currency symbol / code', 'ç · CVU', 'Shown on wallets and the exchange.') +
        field('Civic stipend — residency floor', '50', 'Everyone with active residency receives this.', { type: 'number' }) +
        field('Stipend — bump cap (max stacked)', '20', 'The most the role differentials can add.', { type: 'number' }) +
        field('Per-role pay — node operators', '8', 'Civic-duty pay for the people running nodes.', { type: 'number' }) +
        field('Per-role pay — social moderators', '5', 'Civic-duty pay for moderators.', { type: 'number' }) +
        field('Per-role pay — civic office-holders', '12', 'Civic-duty pay for elected & appointed officers.', { type: 'number' }) +
        field('Stipend / UBI interval', '', 'How often the economic clock pays out.', { select: ['Monthly', 'Quarterly', 'Per cycle'] }) +
        '</div></div>' +
        '<div class="card card--inset"><h3>Residency</h3>' +
        field('Residency confirmation window (days)', '30', 'Reference: 30 days of qualifying pings before rights unlock.', { type: 'number' }) + '</div>' +
        '</section>';
    }

    /* 4 — map data, the three real sources */
    function stepMap() {
      return '<section class="card setup-step" aria-labelledby="s4">' + stepHead(4) +
        '<p>Where does your map come from? Three real choices:</p>' +
        '<div class="card card--inset"><div class="radio-group">' +
        '<label class="radio"><input type="radio" name="src" /> <strong>Sync with a federation</strong> — pull the boundaries and populations a federation already uses.</label>' +
        '<label class="radio"><input type="radio" name="src" /> <strong>Upload an export</strong> — a <code>.tar.gz</code> from another instance (it carries the map and saved state; you can pick the file from your browser). The file is checked for a compatible version before anything loads — an older snapshot is refused with a clear message, and a backup made mid-founding drops you back at the step it left off.</label>' +
        '<label class="radio"><input type="radio" name="src" checked /> <strong>Start fresh</strong> — load the standard open geodata (geoBoundaries boundaries + WorldPop populations), planet to neighbourhood.</label>' +
        '</div>' +
        '<div class="cluster" style="margin-block-start:var(--space-2)"><button type="button" class="btn btn--secondary btn--sm" data-sim>Choose a file…</button>' +
        '<button type="button" class="btn btn--secondary btn--sm" data-sim>Load the map</button></div></div>' +
        '<div class="card card--inset"><h3>Live progress <span class="badge badge--success">' + S.icon('check', { size: 'sm' }) + ' run completed</span></h3>' +
        etlBar('Countries', '251', 'countries') + etlBar('States / provinces', '3,382', 'states') +
        etlBar('Counties', '49,345', 'counties') + etlBar('Neighbourhoods', '899,786', 'neighborhoods') +
        etlBar('Populations (WorldPop)', '232', 'countries', true) +
        '<div class="stat-tiles" style="margin-block-start:var(--space-3)">' + tile('232', 'countries') + tile('3,339', 'states') + tile('49,385', 'counties') + tile('951,636', 'total rows') + '</div></div>' +
        '<div class="card card--inset"><h3>Review &amp; accept</h3>' +
        '<p>Inspect the boundaries, populations, and raster overlays — accepting is what <strong>triggers apportionment</strong>.</p>' +
        '<a class="btn btn--secondary" href="' + S.hrefV2('jurisdictions/jurisdiction-browser.html') + '">Open the jurisdiction viewer ' + S.icon('arrow-right', { size: 'sm' }) + '</a></div>' +
        '</section>';
    }

    /* 5 — build districts */
    function stepDistricts() {
      return '<section class="card setup-step" aria-labelledby="s5">' + stepHead(5) +
        '<p>Every legislature needs a map — a partition of its jurisdiction into districts sized within the constitutional seat range.</p>' +
        '<div class="card card--inset" style="border-color:color-mix(in oklch, var(--status-success) 40%, transparent)">' +
        '<h3 style="color:var(--status-success-fg)">' + S.icon('check', { size: 'sm' }) + ' Apportionment complete</h3>' +
        '<div class="cluster" style="gap:var(--space-8)">' +
        '<div class="stat"><span class="stat-number">1</span><span class="stat-label">legislatures sized</span></div>' +
        '<div class="stat stat--accent"><span class="stat-number">1,999</span><span class="stat-label">total seats apportioned</span></div></div>' +
        '<p class="gloss" style="margin-block-start:var(--space-2)">Cube-root sizing applied — every parent jurisdiction with children now has a sized legislature ready for districting.</p></div>' +
        '<p>You’re handed off to the interactive district mapper — auto-seed from the cube-root law, hand-edit any you want, then activate the map.</p>' +
        '<a class="btn btn--primary" href="' + S.hrefV2('jurisdictions/district-mapper.html') + '">Go to the district mapper ' + S.icon('arrow-right', { size: 'sm' }) + '</a>' +
        '</section>';
    }

    /* 6 — seat institutions AND create your first federation account (player one) */
    function stepSeat() {
      return '<section class="card setup-step" aria-labelledby="s6">' + stepHead(6) +
        '<p>The last step. Seat the executive and judicial institutions for every jurisdiction with a legislature — they start <strong>forming</strong>, and members arrive when the elections engine runs — then create your account.</p>' +
        '<div class="grid-2">' +
        '<div class="card card--inset"><div class="stat"><span class="stat-number">1</span><span class="stat-label">legislatures formed</span></div></div>' +
        '<div class="card card--inset"><div class="stat"><span class="stat-number">393</span><span class="stat-label">districts drawn</span></div></div></div>' +
        '<div class="card card--inset"><h3>Institutions seated on Finish</h3><ul>' +
        '<li>For every jurisdiction with a legislature: one executive (default <em>committee</em>) and one judiciary (default <em>appointed</em>, 5 judges, 10-year terms).</li>' +
        '<li>No members yet — those arrive via the elections engine; status stays <em>forming</em>.</li></ul></div>' +
        /* the federation account = player one */
        '<div class="card card--inset" style="border-color:var(--gov-primary)"><h3>' + S.icon('user', { size: 'sm' }) + ' Create your first federation account</h3>' +
        '<p>This is the moment you become a player. Your first federation account is your <strong>player username — player one</strong>. There was no login wall before now; the founder account is created at the very end of founding.</p>' +
        '<div class="grid-2">' +
        field('Player username', 'founder', 'Your handle across the federation.') +
        field('Display name (optional)', '', 'Shown by choice — a handle is the default.') + '</div>' +
        '<p class="gloss">On Finish, play begins as populations reach critical mass.</p></div>' +
        '<div class="card card--inset"><h3>Export this instance (the federation seed)</h3>' +
        '<p class="gloss">Build a portable <code>.tar.gz</code> snapshot — the whole world plus settings. A peer instance restores it as their map source (“upload an export”), and your world becomes theirs to join. A full-planet export is big — around 11&nbsp;GB, 20–40 minutes — so it runs in the background and appears here when done.</p>' +
        '<button type="button" class="btn btn--secondary btn--sm" data-sim>Start full export</button></div>' +
        '</section>';
    }

    function render() {
      var stepper = '<ol class="stepper" aria-label="Founding steps">' + STEPS.map(function (n) {
        return '<li class="stepper-step stepper-step--done"><span>' + S.icon('check', { size: 'sm' }) + ' ' + esc(n) + '</span></li>';
      }).join('') + '</ol>';

      document.getElementById('root').innerHTML =
        '<header><span class="eyebrow">' + S.icon('sliders', { size: 'sm' }) + ' System · the founding loop</span><h1>Found the instance</h1>' +
        '<p class="page-intro">Before anyone plays, someone founds the world. It starts with <strong>your operator account</strong>, then a one-way choice — <strong>join</strong> a federation or <strong>start from scratch</strong> — and the scratch path ends by creating your first account: <strong>player one</strong>. Shown here as a completed end-state.</p></header>' +

        stepper +
        stepOperator() + stepBranch() + stepCosmic() + stepDefaults() + stepMap() + stepDistricts() + stepSeat() +

        '<div class="cluster"><span class="btn btn--primary" aria-disabled="true">Finish &amp; enter as player one ' + S.icon('check', { size: 'sm' }) + '</span>' +
        '<span class="citation">Static end-state — a mockup of the founding loop, not a live run.</span></div>' +
        '<p class="gloss">Once founding finishes, this page retires — coming back to it just takes you home.</p>';

      if (window.CGA.shellV2) window.CGA.shellV2.refresh();
    }

    document.addEventListener('click', function (ev) {
      if (ev.target.closest && ev.target.closest('[data-sim]')) S.announce('Mockup — in the running wizard this would run for real.');
    });
    render();
    document.addEventListener('cga:v2:rerender', render);
  })();
  </script>
</body>
</html>
