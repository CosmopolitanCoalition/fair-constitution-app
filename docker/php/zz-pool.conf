; PHP-FPM pool overrides for dev — loaded AFTER the default www.conf because
; of the "zz-" filename prefix, so these settings win.
;
; Why the bump from the default `pm.max_children = 5`:
;
; This codebase fires several browser-side polling loops + Inertia partial
; reloads + Vite asset requests per page mount. Cold-start (post-container-
; restart) is the worst case: the first few requests pay OPcache + Postgres
; warm-up costs and run 10-15 s each. With only 5 workers, 5 concurrent cold
; requests is enough to saturate the pool and queue every other request —
; including assets that the browser is waiting on to finish the page.
;
; 16 workers gives generous headroom for the warm-up flood without driving
; the host out of memory. Each PHP-FPM worker is ~30-50 MB resident in
; steady-state (Laravel framework + opcache hooks), so 16 workers ≈ 600-800 MB.
; That fits comfortably under typical Docker memory budgets even with the
; other services (postgres, redis, vite, horizon, etl) running.
;
; Higher start_servers + max_spare_servers means a freshly-restarted container
; comes up with more workers already alive — so the cold-start window isn't
; gated on FPM's gradual ramp-up.

[www]
pm = dynamic
pm.max_children      = 16
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
