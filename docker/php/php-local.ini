[PHP]
; Development settings — dev rig tuned for large bulk loads (gigabyte uploads,
; long-running ETL-adjacent requests, big geospatial payloads).

display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /proc/self/fd/2

; ─── Memory ──────────────────────────────────────────────────
memory_limit = 8G

; ─── Uploads / request size ──────────────────────────────────
post_max_size = 20G
upload_max_filesize = 20G
max_file_uploads = 200

; ─── Timeouts (dev box — give long ops room) ─────────────────
; 0 = unlimited; safe for dev, never ship to prod.
max_execution_time = 0
max_input_time = -1
default_socket_timeout = 3600

; ─── Input parser ────────────────────────────────────────────
max_input_vars = 100000
max_input_nesting_level = 256

; ─── Realpath cache (hot path perf on big codebase) ──────────
realpath_cache_size = 4M
realpath_cache_ttl = 600

; ─── Timezone ────────────────────────────────────────────────
date.timezone = UTC

; ─── OPcache ON in dev with revalidate-every-request ─────────
; Compiled bytecode cached in shared memory → 5-10x faster request boot
; (Laravel parses hundreds of files per request; OPcache bypasses the
; Windows bind-mount filesystem read penalty after first compile).
;
; validate_timestamps=1 + revalidate_freq=0 means OPcache stat()s every
; included file on every request. Stat is much cheaper than parse+compile,
; and any file change is picked up on the very next request — no
; "stale code" footgun.
opcache.enable                  = 1
opcache.enable_cli              = 1
opcache.validate_timestamps     = 1
opcache.revalidate_freq         = 0
opcache.memory_consumption      = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 20000
opcache.fast_shutdown           = 1
