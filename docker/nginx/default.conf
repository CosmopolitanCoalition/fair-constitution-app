server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ─── Body / timeout limits (dev rig, gigabyte payloads) ──
    client_max_body_size       20g;
    client_body_buffer_size    512k;
    client_body_timeout        3600s;
    client_header_timeout      3600s;
    send_timeout               3600s;
    keepalive_timeout          3600s;

    # ─── Laravel routing ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM ─────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass         app:9000;
        fastcgi_index        index.php;
        fastcgi_param        SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include              fastcgi_params;

        # Long ops allowed in dev
        fastcgi_connect_timeout  300s;
        fastcgi_send_timeout     3600s;
        fastcgi_read_timeout     3600s;

        # Larger buffers for big JSON/GeoJSON responses
        fastcgi_buffer_size      128k;
        fastcgi_buffers          16 128k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
    }

    # ─── Built assets (production: `npm run build` → public/build) ────
    # Served statically. In dev (Vite HMR) these are never requested — the @vite
    # directive points the browser straight at the Vite dev server instead.
    location /build/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── Vite HMR proxy (dev only) ────────────────────────────
    # Deferred DNS (resolver + a variable upstream) so nginx STARTS even when the
    # vite container isn't running — e.g. a deploy.sh PRODUCTION stack that serves
    # built assets and omits vite. With a hard-coded `proxy_pass http://vite:5173`,
    # nginx resolves `vite` at startup and aborts ("host not found in upstream").
    # In dev, vite is up and these resolve + proxy at request time; in production
    # they are never requested.
    resolver 127.0.0.11 ipv6=off valid=30s;
    location /@vite/ {
        set $vite_upstream vite:5173;
        proxy_pass http://$vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /hot {
        set $vite_upstream vite:5173;
        proxy_pass http://$vite_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
    }

    # ─── CGA appservice AS-API (Phase K-3) — MUST precede /_matrix/ ───
    # Synapse pushes appservice transactions to /_matrix/app/v1/... — those are served by the
    # in-Laravel appservice, NOT the homeserver. This longer, more-specific prefix wins over the
    # /_matrix/ → Synapse proxy below, routing /_matrix/app/ to Laravel (PHP front controller).
    location /_matrix/app/ {
        try_files $uri /index.php?$query_string;
    }

    # ─── Matrix homeserver proxy (Phase K-3 — Plane B) ────────
    # /_matrix/ (client + S2S federation) → the fc_matrix container. Deferred DNS (a
    # variable upstream, like the vite blocks) so nginx still BOOTS when matrix is down
    # — a federation mirror or a stack that omitted the homeserver still serves the app.
    # The .well-known/matrix/{server,client} delegation is served by Laravel (a route),
    # not here, because nginx cannot env-substitute the JSON body.
    location /_matrix/ {
        set $matrix_upstream matrix:8008;
        proxy_pass              http://$matrix_upstream;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
        # Matrix media + large sync responses; long-poll /sync needs a generous read timeout.
        client_max_body_size    512m;
        proxy_read_timeout      600s;
        proxy_buffering         off;
    }

    # ─── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ─── Static asset caching ─────────────────────────────────
    # Fall through to Laravel when the file doesn't exist on disk so routes
    # like /api/jurisdictions/{id}/raster.png can generate the PNG on demand.
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        try_files $uri /index.php?$query_string;
        expires 1d;
        add_header Cache-Control "public";
    }

    # ─── Block hidden files ───────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
