# Isolated TLS demo terminator (Mesh Roles rig). Serves the production wildcard
# *.worldofstatecraft.org and forwards to the existing app nginx. Runs as a SEPARATE
# container (fcw_tlsdemo) so the running Box A stack (federation on :8081) is untouched.
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /var/www/html/storage/app/mesh-tls/wildcard.worldofstatecraft.org.crt;
    ssl_certificate_key /var/www/html/storage/app/mesh-tls/wildcard.worldofstatecraft.org.key;

    location / {
        proxy_pass http://nginx:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}
