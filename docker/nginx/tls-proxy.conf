# Rig TLS terminator — serves the REAL *.worldofstatecraft.org wildcard cert to LAN devices.
# A phone reaching the box over http://<LAN-IP> is an INSECURE context: the browser disables
# crypto.subtle (the device signature) AND getUserMedia (mic/camera), so voice can't work. Fronting
# the box with the real cert under box-a.worldofstatecraft.org makes every LAN device a secure context.
#
#   :443  → the app nginx          (https://box-a.worldofstatecraft.org)
#   :7443 → the LiveKit signaling  (wss://box-a.worldofstatecraft.org:7443  → livekit:7880)
#
# Media (UDP 7882 / TCP 7881) is NOT proxied — it's WebRTC DTLS-SRTP straight to the SFU's node_ip
# (the host LAN IP). Opt-in via the `tls` compose profile; the plain :8081 http stack is untouched.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── App over HTTPS ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /certs/wildcard.worldofstatecraft.org.crt;
    ssl_certificate_key /certs/wildcard.worldofstatecraft.org.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    location / {
        proxy_pass http://nginx:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}

# ── LiveKit signaling over WSS ──────────────────────────────────────────────
server {
    listen 7443 ssl;
    server_name _;

    ssl_certificate     /certs/wildcard.worldofstatecraft.org.crt;
    ssl_certificate_key /certs/wildcard.worldofstatecraft.org.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://livekit:7880;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
