# HAProxy in front of the Patroni cluster (Phase G HA data tier).
#
# The app connects to ONE stable endpoint (haproxy:5432) and always reaches the
# CURRENT primary — even across a failover — because HAProxy health-checks each
# node's Patroni REST API:
#   GET /primary → 200 only on the leader      → the :5432 write endpoint
#   GET /replica → 200 only on a hot standby   → the :5433 read endpoint
#
# This is why LeaderProbe is honest: pg_is_in_recovery() over haproxy:5432 is
# false (it's the primary); the moment Patroni promotes a new leader, HAProxy
# repoints :5432 and the timeline_id increments — the leadership epoch advances.

global
    maxconn 500
    log stdout format raw local0

defaults
    log     global
    mode    tcp
    retries 2
    timeout connect 5s
    timeout client  30m
    timeout server  30m
    timeout check   5s

# Operator dashboard — cluster health at a glance.
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 5s

# ── Writes — always the single current primary ───────────────────────────
listen postgres_write
    bind *:5432
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni1 patroni1:5432 maxconn 200 check port 8008
    server patroni2 patroni2:5432 maxconn 200 check port 8008

# ── Reads — any healthy hot standby (round-robin) ────────────────────────
listen postgres_read
    bind *:5433
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni1 patroni1:5432 maxconn 200 check port 8008
    server patroni2 patroni2:5432 maxconn 200 check port 8008
