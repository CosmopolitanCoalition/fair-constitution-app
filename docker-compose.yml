services:

  # ─── PHP 8.4 / Laravel 12 Application ───────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${CONTAINER_PREFIX:-fc}_app
    restart: unless-stopped
    # G8b: reach host-resident daemons (a Tor SOCKS proxy, or a host-bound overlay relay)
    # from inside the container — federation egress originates here. Docker Desktop provides
    # this automatically; on Linux it makes host.docker.internal resolve to the host gateway.
    # Harmless when unused. See docs/plans/phase-g-continuation/G8b-OVERLAY-EGRESS.md.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /var/www/html
    # -R lets php-fpm run its pool as root in dev. Windows bind mounts show
    # every file as root-owned, so running PHP as www-data causes permission
    # errors on every write to storage/, bootstrap/cache/, and scripts/etl/control/.
    command: ["php-fpm", "-R"]
    volumes:
      - .:/var/www/html                    # bind mount — edits are instant
      - vendor:/var/www/html/vendor        # named volume — Linux FS (Windows bind mount chokes on composer archives)
      - composer_cache:/root/.composer     # cache composer downloads
      # Bind mount the dev ini so edits on host survive container recreation
      # (image still has a COPY of it baked in, but this overrides on start).
      - ./docker/php/php-local.ini:/usr/local/etc/php/conf.d/99-local.ini:ro
      # Same trick for the entrypoint script: the Dockerfile bakes it in at
      # /usr/local/bin/fc-entrypoint.sh, but bind-mounting the live copy on
      # top means edits to docker/php/entrypoint.sh take effect on the next
      # container recreate without a `docker compose build`.
      - ./docker/php/entrypoint.sh:/usr/local/bin/fc-entrypoint.sh:ro
      # Protomaps PMTiles directory — Laravel's /api/maps/latest-pmtiles
      # scans this folder to pick the most recent YYYYMMDD.pmtiles file.
      # Matches the nginx mount so the same files are reachable via both
      # the Laravel API (scan) and the HTTP /maps/protomaps/ path (serve).
      - ${PROTOMAPS_DIR:-./data/protomaps}:/var/www/html/public/maps/protomaps:ro
    environment:
      # Default to dev (local + debug) so Box A's `docker compose up` is unchanged;
      # deploy.sh sets APP_ENV=production / APP_DEBUG=false in .env for a deployed box.
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      PHP_OPCACHE_ENABLE: 0                # disable opcache in dev for live changes
    healthcheck:
      # vendor/autoload.php exists once the entrypoint's composer install finishes —
      # at which point php-fpm is listening. The generous window (start_period +
      # 90×10s) covers a slow first `composer install` on a Raspberry Pi. nginx
      # waits on this (service_healthy) so it never proxies to a not-yet-up fpm,
      # and deploy.sh polls the same file before firing artisan.
      test: ["CMD-SHELL", "test -f /var/www/html/vendor/autoload.php"]
      interval: 10s
      timeout: 5s
      retries: 90
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fc_network

  # ─── Nginx ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ${CONTAINER_PREFIX:-fc}_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"      # set NGINX_HOST_PORT in .env per checkout (parent=8080, worktrees pick different ports)
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Protomaps PMTiles bundles, served at /maps/protomaps/{filename}.
      # Operator drops dated files (YYYYMMDD.pmtiles) into this host
      # directory; the /api/maps/latest-pmtiles backend endpoint scans the
      # directory and tells the frontend which one to load. Override the
      # host path via PROTOMAPS_DIR in .env when needed.
      - ${PROTOMAPS_DIR:-./data/protomaps}:/var/www/html/public/maps/protomaps:ro
    depends_on:
      app:
        condition: service_healthy
      # nginx waits for the app to be HEALTHY (composer done, php-fpm listening) so
      # a fresh deploy never serves a 502 from a not-yet-ready upstream.
      #
      # nginx no longer hard-waits for vite. In DEV (`docker compose up`) vite still
      # starts and HMR works — nginx just doesn't block on it (a cold Vite briefly
      # serves nothing, then warms). In a deploy.sh PRODUCTION run vite isn't started
      # at all; nginx serves the built assets from public/build statically (the
      # `location ~* \.(js|css|woff2?|…)$` block), so there is nothing to wait for.
    networks:
      - fc_network

  # ─── PostgreSQL 17 + PostGIS 3.5 ─────────────────────────────
  postgres:
    # Default is the official image (amd64-only). On arm64 (Raspberry Pi, ARM
    # servers, Apple Silicon) set POSTGIS_IMAGE=imresamu/postgis:17-3.5 in .env —
    # a faithful multi-arch rebuild of the same Postgres 17 + PostGIS 3.5.
    image: ${POSTGIS_IMAGE:-postgis/postgis:17-3.5}
    container_name: ${CONTAINER_PREFIX:-fc}_postgres
    restart: unless-stopped
    # P.1.2: bump stop grace period from Docker's 10 s default to 120 s.
    # Mid-ETL postgres has GBs of dirty buffers + open transactions to
    # flush + checkpoint on shutdown. 10 s isn't enough → SIGKILL →
    # unclean shutdown → WAL recovery on next boot (minutes of downtime
    # while the DB replays the WAL). 120 s lets postgres complete a clean
    # shutdown even with the heaviest write workload. Docker only waits
    # up to this long; clean shutdowns of an idle DB still take <1 s.
    stop_grace_period: 120s
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432" # set POSTGRES_HOST_PORT in .env to avoid clashing with another stack on 5432
    # Phase L (memory-tuned): pair with the etl container's 2 GB cap so the
    # two of them together fit inside the host (~7.5 GB RAM) with margin.
    # 5 GB covers shared_buffers=4GB + a few concurrent ST_Intersects work
    # buffers (256 MB each). Without this cap, postgres + etl could both
    # grab system memory and the kernel OOM-killer would terminate whichever
    # was bigger when memory ran out (this is what happened during the
    # ADM2-ADM3 phase of the world ETL: PG backend OOM at 03:56).
    mem_limit: 5g
    memswap_limit: 5g
    environment:
      POSTGRES_DB: fair_constitution
      POSTGRES_USER: fc_user
      POSTGRES_PASSWORD: fc_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    # Dev rig tuning — generous memory for bulk geospatial loads, SSD cost hints.
    #
    # Phase L (memory-tuned): shared_buffers dropped from 4 GB → 1 GB. We're
    # write-heavy (ETL bulk-loads native-vertex GeoJSON) and barely re-read
    # any pages, so a large buffer pool was wasted memory. Inserts of giant
    # MultiPolygons (Nunavut: ~200 MB GeoJSON → multi-million-vertex geometry)
    # need ~2–3 GB of transient operator memory for ST_GeomFromGeoJSON +
    # ST_MakeValid + ST_Multi. With the 5 GB container cap, 4 GB of that was
    # locked up by shared_buffers and the OS was OOM-killing the backend
    # whenever a giant insert hit the 1 GB headroom. Dropping shared_buffers
    # to 1 GB gives the operators ~4 GB of room — comfortable for any single
    # feature in the world dataset.
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "work_mem=256MB"
      - "-c"
      - "maintenance_work_mem=1GB"
      - "-c"
      - "max_wal_size=8GB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "max_worker_processes=8"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "statement_timeout=0"
      - "-c"
      - "idle_in_transaction_session_timeout=0"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # named volume — persists across rebuilds
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fc_user -d fair_constitution"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fc_network

  # ─── Matrix homeserver (Phase K-3 — the live commons, Plane B) ───
  # Synapse (dev default; Dendrite is the Pi candidate via MATRIX_IMPL / MATRIX_IMAGE).
  # ONE CGA instance = ONE homeserver, federating peer-to-peer like the federation_peers mesh;
  # the in-Laravel CGA appservice is the only thing that talks to it. matrix-org/synapse was
  # ARCHIVED Apr 2024 — development + the maintained image moved to element-hq (AGPLv3). On
  # first boot the entrypoint generates config + signing key into the volume, then runs with the
  # CGA conf.d overrides (postgres on the shared server, empty federation whitelist, no policy
  # server) merged on top. The matrix DB is created by init.sql (fresh volume) / the deploy guard.
  matrix:
    image: ${MATRIX_IMAGE:-ghcr.io/element-hq/synapse:latest}
    container_name: ${CONTAINER_PREFIX:-fc}_matrix
    restart: unless-stopped
    environment:
      SYNAPSE_SERVER_NAME: ${MATRIX_DOMAIN:-localhost}
      SYNAPSE_REPORT_STATS: "no"
      SYNAPSE_CONFIG_DIR: /data
      # Run as root so the root-owned named /data volume is writable (dev parity with php-fpm -R).
      UID: "0"
      GID: "0"
    entrypoint: ["/bin/sh", "/cga-matrix-entrypoint.sh"]
    command: ["run"]
    ports:
      - "${MATRIX_HOST_PORT:-8008}:8008"   # set MATRIX_HOST_PORT per checkout (parent 8008, worktrees bump)
    volumes:
      - matrix_data:/data
      - ./docker/matrix/conf.d:/data/conf.d:ro
      - ./docker/matrix/entrypoint.sh:/cga-matrix-entrypoint.sh:ro
      - ./docker/matrix/appservice/registration.yaml:/data/appservice-registration.yaml:ro
    healthcheck:
      # python is guaranteed in the image (Synapse is Python); curl is not.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8008/_matrix/client/versions')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fc_network

  # ─── Matrix Authentication Service (MAS — Phase K-3, OIDC for Matrix) ───
  # MSC3861 OIDC provider fronting Synapse — the homeserver never sees a password; CGA login is the
  # only credential (CGA-as-upstream-OIDC wired in K3-C provisioning). Rust, light. Its own
  # matrix_auth DB (created in K3-A). Synapse delegates auth to it via the matrix_authentication_service
  # conf.d block. On a fresh box `php artisan matrix:setup` (K3-D) generates the config + the secret it
  # shares with Synapse; the dev config lives at docker/matrix/mas/config.yaml (gitignored — carries keys).
  mas:
    image: ${MAS_IMAGE:-ghcr.io/element-hq/matrix-authentication-service:latest}
    container_name: ${CONTAINER_PREFIX:-fc}_mas
    restart: unless-stopped
    command: ["server", "--config", "/config/config.yaml"]
    ports:
      - "${MAS_HOST_PORT:-8090}:8080"
    volumes:
      - ./docker/matrix/mas/config.yaml:/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fc_network

  # ─── LiveKit (Element Call SFU — Phase K-3 K3-J, voice/video) ───────────
  # OPT-IN via the `voice` profile: `docker compose --profile voice up -d livekit` (the default stack
  # stays lean; media needs UDP ports). The appservice mints residency-gated, room-scoped HS256 join
  # tokens over the api_secret in docker/livekit/livekit.yaml (matches config/matrix.php dev defaults).
  # Pi A/V is deferred to the scaling boxes; this is the dev-stack SFU only.
  livekit:
    image: ${LIVEKIT_IMAGE:-livekit/livekit-server:latest}
    container_name: ${CONTAINER_PREFIX:-fc}_livekit
    restart: unless-stopped
    profiles: ["voice"]
    command: ["--config", "/etc/livekit.yaml", "--node-ip", "${LIVEKIT_NODE_IP:-127.0.0.1}"]
    ports:
      - "${LIVEKIT_HOST_PORT:-7880}:7880"
      - "7881:7881"
      # Single muxed UDP media port (matches rtc.udp_port in livekit.yaml). The old 50000-50100 range
      # collides with Windows/Hyper-V reserved UDP exclusions; one low port is portable + enough for dev.
      - "${LIVEKIT_UDP_PORT:-7882}:7882/udp"
    volumes:
      - ./docker/livekit/livekit.yaml:/etc/livekit.yaml:ro
    networks:
      - fc_network

  # ─── TLS terminator (rig) — real *.worldofstatecraft.org cert for LAN devices ─
  # Opt-in via the `tls` profile (needs the `voice` SFU too for wss):
  #   docker compose --profile voice --profile tls up -d
  # Fronts the box so a phone/Box B over the LAN gets a SECURE CONTEXT (WebCrypto +
  # getUserMedia + wss). Point box-a.worldofstatecraft.org (DNS-only A record) at the
  # host's LAN IP. The plain :8081 http stack stays untouched.
  tlsproxy:
    image: nginx:1.27-alpine
    container_name: ${CONTAINER_PREFIX:-fc}_tlsproxy
    restart: unless-stopped
    profiles: ["tls"]
    depends_on:
      - nginx
      - livekit
    ports:
      - "${TLS_HOST_PORT:-443}:443"
      - "${LIVEKIT_WSS_PORT:-7443}:7443"
    volumes:
      - ./docker/nginx/tls-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage/app/mesh-tls:/certs:ro
    networks:
      - fc_network

  # ─── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: ${CONTAINER_PREFIX:-fc}_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data                   # persists cache/queue data
    networks:
      - fc_network

  # ─── Vite Dev Server (Vue 3 hot reload) ──────────────────────
  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${CONTAINER_PREFIX:-fc}_vite
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
      # Bind-mount the vite entrypoint script. It auto-runs `npm install`
      # when package.json/package-lock.json drift from the stamp in the
      # node_modules named volume — eliminates the "blank page after git
      # pull adds new deps" failure mode. The file is checked into git
      # under docker/vite/ so any checkout (parent + worktrees) gets it
      # without rebuilding the image.
      - ./docker/vite/entrypoint.sh:/usr/local/bin/vite-entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/vite-entrypoint.sh"]
    # Propagate the host-side port mappings into the container so vite.config.js
    # can construct the right URLs for cors / origin / hmr.clientPort. Without
    # these, vite hardcoded its origin and HMR ports to whatever was last in
    # the source file — i.e. whichever checkout edited vite.config.js most
    # recently. With them, every checkout self-configures from .env.
    environment:
      - VITE_HOST_PORT=${VITE_HOST_PORT:-5173}
      - NGINX_HOST_PORT=${NGINX_HOST_PORT:-8080}
    ports:
      - "${VITE_HOST_PORT:-5173}:5173"     # set VITE_HOST_PORT in .env per checkout
    # Dev mode (`vite`) with two cold-start mitigations configured in
    # vite.config.js:
    #   • optimizeDeps.include  — pre-bundles big libs (Inertia, Vue, axios,
    #     leaflet, protomaps-leaflet, vue-leaflet) into single esbuild chunks
    #     on first run; cached in node_modules/.vite/deps (named volume,
    #     persistent across restarts). Avoids the cold-load waterfall through
    #     hundreds of individual node_modules files.
    #   • server.warmup        — eagerly compiles every page/component/layout
    #     in parallel as soon as the dev server boots. By the time the operator
    #     hits the page, the SFCs are already transformed.
    #
    # Net cold-restart cost: ~5s dev server boot + ~5-10s parallel warmup,
    # vs the 4-5min that `vite build --watch` incurred. HMR also restored —
    # for the iterations where ONLY Vue changes (no PHP), no container restart
    # is needed at all; just save the file and the browser hot-replaces.
    command: npm run dev -- --host 0.0.0.0 --port 5173
    # Healthcheck gates nginx: it doesn't pass until Vite's cold compile of
    # the hot-path assets is done. The test fetches app.css internally; the
    # first call triggers Tailwind's first scan + transform (a few seconds),
    # subsequent calls are sub-100ms. start_period gives Vite room to boot
    # AND complete that first compile without retries counting against it.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null --max-time 60 http://localhost:5173/resources/css/app.css && curl -fsS -o /dev/null --max-time 30 http://localhost:5173/@vite/client && curl -fsS -o /dev/null --max-time 30 http://localhost:5173/resources/js/app.js"]
      interval: 5s
      timeout: 65s
      retries: 24
      start_period: 90s
    depends_on:
      - app
    networks:
      - fc_network

  # ─── Laravel Horizon (queue worker) ──────────────────────────
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${CONTAINER_PREFIX:-fc}_horizon
    restart: unless-stopped
    # G8b: the federation heartbeat (CLK-20 push + cold-sync + probe) runs here, so it
    # needs the same host-daemon reachability as the app. See G8b-OVERLAY-EGRESS.md.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - composer_cache:/root/.composer
      # Same live-entrypoint override as the app service — see the comment
      # there for the rationale.
      - ./docker/php/entrypoint.sh:/usr/local/bin/fc-entrypoint.sh:ro
    command: php artisan horizon
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fc_network

  # ─── Laravel Scheduler (constitutional clocks) ───────────────
  # Runs `php artisan schedule:work` — the WI-6 clock sweep
  # (routes/console.php schedules EvaluateClocksJob every minute onto the
  # default Horizon queue, plus horizon:snapshot every five). Mirrors the
  # horizon service's build/volumes/env so a single image serves both.
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${CONTAINER_PREFIX:-fc}_scheduler
    restart: unless-stopped
    # G8b: parity with app/horizon for host-daemon reachability. See G8b-OVERLAY-EGRESS.md.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - composer_cache:/root/.composer
      # Same live-entrypoint override as the app service — see the comment
      # there for the rationale.
      - ./docker/php/entrypoint.sh:/usr/local/bin/fc-entrypoint.sh:ro
    command: php artisan schedule:work
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fc_network

  # ─── Python ETL (geoBoundaries + WorldPop) ──────────
  etl:
    build:
      context: .
      dockerfile: docker/etl/Dockerfile
    container_name: ${CONTAINER_PREFIX:-fc}_etl
    working_dir: /etl
    # P.1.2: give the ETL supervisor up to 60 s to forward SIGTERM to its
    # active subprocess and let Python's finally blocks close DB
    # connections cleanly. Important so postgres doesn't see abandoned
    # transactions when the containers are stopped mid-run.
    stop_grace_period: 60s
    # Phase L (memory-tuned): streaming-pipeline + 64 MB batch ceiling means
    # per-feature peak is ~800 MB (worst case = Nunavut). 2 GB cap leaves
    # generous headroom AND keeps the pair of containers (postgres ~4 GB +
    # etl 2 GB) within the host's ~7.5 GB so the kernel OOM-killer doesn't
    # fire system-wide if either side gets aggressive. The earlier 4 GB cap
    # let etl + postgres compete for 8 GB of system memory and they took
    # turns OOM-killing each other.
    #
    # IMPORTANT: docker compose only applies these limits when the container
    # is RECREATED (`docker compose down etl && docker compose up -d etl`),
    # not on a plain restart. `docker inspect ${CONTAINER_PREFIX:-fc}_etl --format '{{.HostConfig.Memory}}'`
    # should report 2147483648; if it reports 0, the limit isn't actually
    # bound and a recreate is needed.
    mem_limit: 2g
    memswap_limit: 2g
    volumes:
      - ./scripts/etl:/etl                 # your python scripts
      - etl_geodata:/data                  # downloaded geodata persists (can be large)
      - ./docs:/docs:ro                    # constitutional docs (not ETL data)
      - ${ARCHIVE_PATH:-./data/archive}:/archive:ro  # geoBoundaries+WorldPop archive (override with ARCHIVE_PATH env in .env)
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fair_constitution
      DB_USER: fc_user
      DB_PASSWORD: fc_password
      DATA_ROOT: /archive                  # ETL scripts read geoBoundaries/WorldPop from here
    command: python3 -u /etl/supervisor.py # polls /etl/control/request.json for Laravel-submitted jobs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fc_network

# ─── Named Volumes ────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  matrix_data:                 # Phase K-3 — Synapse config, signing key, media store
    driver: local
  redis_data:
    driver: local
  etl_geodata:
    driver: local
  composer_cache:
    driver: local
  node_modules:
    driver: local
  vendor:
    driver: local

# ─── Network ─────────────────────────────────────────────────
networks:
  fc_network:
    driver: bridge
